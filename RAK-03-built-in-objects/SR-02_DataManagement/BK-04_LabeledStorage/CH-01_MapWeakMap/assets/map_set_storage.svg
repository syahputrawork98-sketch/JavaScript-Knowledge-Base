<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <!-- Map Section (Left) -->
  <text x="200" y="50" fill="#38bdf8" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">MAP: Labeled Shelves</text>
  <rect x="50" y="80" width="300" height="280" fill="#1e293b" rx="5" stroke="#334155" stroke-width="2"/>
  <!-- Shelves -->
  <line x1="70" y1="150" x2="330" y2="150" stroke="#475569" stroke-width="2"/>
  <line x1="70" y1="220" x2="330" y2="220" stroke="#475569" stroke-width="2"/>
  <line x1="70" y1="290" x2="330" y2="290" stroke="#475569" stroke-width="2"/>
  
  <!-- Map Items -->
  <g transform="translate(80, 100)">
    <rect width="60" height="40" fill="#0ea5e9" rx="3"/>
    <text x="30" y="25" fill="#f8fafc" font-family="Arial" font-size="10" text-anchor="middle">KEY (Obj)</text>
    <path d="M70 20 L100 20" stroke="#f8fafc" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="110" y="5" width="60" height="30" fill="#fbbf24" rx="3"/>
    <text x="140" y="25" fill="#0f172a" font-family="Arial" font-size="10" text-anchor="middle">VALUE</text>
  </g>
  
  <!-- Set Section (Right) -->
  <text x="600" y="50" fill="#22c55e" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">SET: Uniqueness Funnel</text>
  <!-- Funnel Top -->
  <path d="M500 80 L700 80 L620 180 L580 180 Z" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <!-- Unique Tray -->
  <rect x="530" y="220" width="140" height="140" fill="#1e293b" rx="5" stroke="#334155" stroke-width="2"/>
  
  <!-- Duplicate Items falling -->
  <rect x="550" y="100" width="30" height="30" fill="#fbbf24" rx="3" opacity="0.6"/>
  <rect x="620" y="100" width="30" height="30" fill="#fbbf24" rx="3" opacity="0.6"/>
  <path d="M600 185 L600 215" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Unique Item in Tray -->
  <rect x="585" y="250" width="30" height="30" fill="#22c55e" rx="3"/>
  
  <!-- Arrow Definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f8fafc" />
    </marker>
  </defs>
</svg>
