<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <!-- Conveyor Belt -->
  <rect x="50" y="200" width="700" height="60" fill="#1e293b" stroke="#475569" stroke-width="4"/>
  <path d="M50 230 L750 230" stroke="#334155" stroke-width="2" stroke-dasharray="20,10"/>
  
  <!-- Robot Arm (Map) -->
  <g transform="translate(300, 100)">
    <rect x="-10" y="0" width="20" height="100" fill="#64748b"/>
    <rect x="-40" y="100" width="80" height="20" fill="#38bdf8" rx="5"/>
    <text x="0" y="-10" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">.map()</text>
    <text x="0" y="-30" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Transformer</text>
  </g>
  
  <!-- Robot Arm (Filter) -->
  <g transform="translate(500, 100)">
    <rect x="-10" y="0" width="20" height="100" fill="#64748b"/>
    <path d="M-30 100 L30 100 L0 130 Z" fill="#ef4444"/>
    <text x="0" y="-10" fill="#ef4444" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">.filter()</text>
    <text x="0" y="-30" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Quality Control</text>
  </g>
  
  <!-- Data Packages on Belt -->
  <g transform="translate(100, 210)">
    <rect width="40" height="40" fill="#fbbf24" rx="5"/>
    <text x="20" y="25" fill="#0f172a" font-family="Arial" font-size="12" text-anchor="middle">Data</text>
  </g>
  <g transform="translate(200, 210)">
    <rect width="40" height="40" fill="#fbbf24" rx="5"/>
    <text x="20" y="25" fill="#0f172a" font-family="Arial" font-size="12" text-anchor="middle">Data</text>
  </g>
  <g transform="translate(400, 210)">
    <rect width="40" height="40" fill="#22c55e" rx="5"/> <!-- Transformed -->
    <text x="20" y="25" fill="#0f172a" font-family="Arial" font-size="12" text-anchor="middle">MOD</text>
  </g>
  
  <!-- Titles -->
  <text x="400" y="50" fill="#f8fafc" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">ARRAY CONVEYOR BELT</text>
  <text x="400" y="80" fill="#94a3b8" font-family="Arial" font-size="16" text-anchor="middle">Automated Processing with Higher-Order Methods</text>
  
  <!-- Arrows -->
  <path d="M720 230 L740 230 M730 220 L740 230 L730 240" stroke="#94a3b8" stroke-width="2" fill="none"/>
</svg>
