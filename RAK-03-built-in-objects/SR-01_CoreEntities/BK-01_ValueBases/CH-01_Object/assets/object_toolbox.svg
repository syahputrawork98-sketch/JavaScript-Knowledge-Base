<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <!-- Toolbox Body -->
  <rect x="250" y="150" width="300" height="180" fill="#334155" stroke="#94a3b8" stroke-width="4" rx="5"/>
  <rect x="230" y="150" width="340" height="20" fill="#1e293b" stroke="#94a3b8" stroke-width="2" rx="2"/>
  <path d="M350 150 L350 120 Q350 100 400 100 Q450 100 450 120 L450 150" fill="none" stroke="#94a3b8" stroke-width="8"/>
  
  <!-- Tools inside/around -->
  <!-- Keys Tool -->
  <g transform="translate(150, 200)">
    <circle cx="0" cy="0" r="30" fill="#38bdf8" fill-opacity="0.2" stroke="#38bdf8" stroke-width="2"/>
    <path d="M-15 -10 L15 10 M-15 10 L15 -10" stroke="#38bdf8" stroke-width="4"/>
    <text x="0" y="50" fill="#38bdf8" font-family="Arial" font-size="14" text-anchor="middle">.keys()</text>
    <text x="0" y="70" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Extract Labels</text>
  </g>
  
  <!-- Assign Tool -->
  <g transform="translate(650, 200)">
    <circle cx="0" cy="0" r="30" fill="#fbbf24" fill-opacity="0.2" stroke="#fbbf24" stroke-width="2"/>
    <path d="M-20 0 L10 0 M0 -10 L10 0 L0 10" stroke="#fbbf24" stroke-width="4" fill="none"/>
    <rect x="-15" y="-15" width="10" height="30" fill="#fbbf24" fill-opacity="0.5"/>
    <text x="0" y="50" fill="#fbbf24" font-family="Arial" font-size="14" text-anchor="middle">.assign()</text>
    <text x="0" y="70" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Merge Energy</text>
  </g>
  
  <!-- Freeze Lock -->
  <g transform="translate(400, 250)">
    <rect x="-20" y="-10" width="40" height="30" rx="3" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="2"/>
    <path d="M-12 -10 L-12 -20 Q-12 -30 0 -30 Q12 -30 12 -20 L12 -10" fill="none" stroke="#ef4444" stroke-width="2"/>
    <text x="0" y="40" fill="#ef4444" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">.freeze()</text>
  </g>
  
  <!-- Central Label -->
  <text x="400" y="50" fill="#f8fafc" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">OBJECT TOOLBOX</text>
  <text x="400" y="80" fill="#94a3b8" font-family="Arial" font-size="16" text-anchor="middle">Static Methods of the Ultimate Base</text>
  
  <!-- Decorative Circuits -->
  <path d="M50 200 L120 200 M680 200 L750 200" stroke="#334155" stroke-width="2" stroke-dasharray="5,5"/>
</svg>
