<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <!-- Hub A (Source) -->
  <rect x="50" y="100" width="200" height="200" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
  <text x="150" y="80" fill="#38bdf8" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">HUB A (Object)</text>
  
  <!-- Complex Object in Hub A -->
  <g transform="translate(100, 150)">
    <circle cx="20" cy="20" r="15" fill="#fbbf24"/>
    <rect x="50" y="5" width="30" height="30" fill="#fbbf24"/>
    <path d="M30 60 L70 60 L50 80 Z" fill="#fbbf24"/>
  </g>
  
  <!-- Stringify Process -->
  <g transform="translate(300, 150)">
    <path d="M0 50 L150 50" stroke="#94a3b8" stroke-width="4" stroke-dasharray="10,5" marker-end="url(#arrow-grey)"/>
    <text x="75" y="40" fill="#f8fafc" font-family="Arial" font-size="12" text-anchor="middle">JSON.stringify()</text>
    <!-- Text Package -->
    <rect x="40" y="60" width="80" height="30" fill="#334155" rx="3"/>
    <text x="80" y="80" fill="#22c55e" font-family='Courier New' font-size="10" text-anchor="middle">'{"id":1...}'</text>
  </g>
  
  <!-- Hub B (Destination) -->
  <rect x="550" y="100" width="200" height="200" fill="#1e293b" stroke="#38bdf8" stroke-width="2" rx="10"/>
  <text x="650" y="80" fill="#38bdf8" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">HUB B (Reconstructed)</text>
  
  <!-- Reconstructed Object in Hub B -->
  <g transform="translate(600, 150)">
    <circle cx="20" cy="20" r="15" fill="#22c55e" opacity="0.8"/>
    <rect x="50" y="5" width="30" height="30" fill="#22c55e" opacity="0.8"/>
    <path d="M30 60 L70 60 L50 80 Z" fill="#22c55e" opacity="0.8"/>
    <text x="50" y="110" fill="#22c55e" font-family="Arial" font-size="12" text-anchor="middle">JSON.parse()</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="40" fill="#f8fafc" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">UNIVERSAL JSON EXCHANGE</text>
  
  <!-- Arrow Definition -->
  <defs>
    <marker id="arrow-grey" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
    </marker>
  </defs>
</svg>
