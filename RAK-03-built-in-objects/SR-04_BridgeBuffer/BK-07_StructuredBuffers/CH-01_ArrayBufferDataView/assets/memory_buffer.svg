<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a" rx="10"/>
  
  <!-- ArrayBuffer (The Strip) -->
  <text x="400" y="50" fill="#94a3b8" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">ARRAYBUFFER: Raw Storage (8 Bytes)</text>
  <g transform="translate(100, 80)">
    <!-- Byte Cells -->
    <rect x="0" y="0" width="75" height="100" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="75" y="0" width="75" height="100" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="150" y="0" width="75" height="100" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="225" y="0" width="75" height="100" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="300" y="0" width="75" height="100" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="375" y="0" width="75" height="100" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="450" y="0" width="75" height="100" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <rect x="525" y="0" width="75" height="100" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    
    <!-- Binary Data Bits -->
    <text x="37" y="55" fill="#475569" font-family="Courier New" font-size="12" text-anchor="middle">01101...</text>
    <text x="112" y="55" fill="#475569" font-family="Courier New" font-size="12" text-anchor="middle">10110...</text>
    <text x="187" y="55" fill="#475569" font-family="Courier New" font-size="12" text-anchor="middle">00101...</text>
    
    <!-- Indices -->
    <text x="37" y="120" fill="#64748b" font-family="Arial" font-size="10" text-anchor="middle">Byte 0</text>
    <text x="112" y="120" fill="#64748b" font-family="Arial" font-size="10" text-anchor="middle">Byte 1</text>
    <text x="562" y="120" fill="#64748b" font-family="Arial" font-size="10" text-anchor="middle">Byte 7</text>
  </g>
  
  <!-- DataView (The Window) -->
  <g transform="translate(100, 220)">
    <path d="M0 0 L600 0" stroke="#fbbf24" stroke-width="2" stroke-dasharray="10,5"/>
    <text x="300" y="-20" fill="#fbbf24" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">DATAVIEW: Granular Access</text>
    
    <!-- View 1: Int8 -->
    <rect x="0" y="20" width="75" height="60" fill="#fbbf24" fill-opacity="0.2" stroke="#fbbf24" stroke-width="2"/>
    <text x="37" y="100" fill="#fbbf24" font-family="Arial" font-size="12" text-anchor="middle">getInt8(0)</text>
    
    <!-- View 2: Float32 (4 bytes) -->
    <rect x="75" y="20" width="300" height="60" fill="#38bdf8" fill-opacity="0.2" stroke="#38bdf8" stroke-width="2"/>
    <text x="225" y="100" fill="#38bdf8" font-family="Arial" font-size="12" text-anchor="middle">getFloat32(1)</text>
    <text x="225" y="55" fill="#f8fafc" font-family="Arial" font-size="14" text-anchor="middle">4-Byte Window</text>
  </g>
</svg>
