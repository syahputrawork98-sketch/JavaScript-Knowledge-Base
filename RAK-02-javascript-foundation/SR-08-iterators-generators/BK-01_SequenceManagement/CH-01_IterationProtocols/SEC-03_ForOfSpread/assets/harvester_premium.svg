<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="harvesterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Source (Iterable) -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="100" height="180" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="2" stroke-dasharray="4,2" />
    <text x="50" y="-15" font-family="Arial, sans-serif" font-size="12" fill="#34d399" text-anchor="middle" font-weight="bold">ITERABLE</text>
    
    <!-- Data Chunks -->
    <rect x="20" y="20" width="60" height="20" rx="5" fill="#34d399" opacity="0.6" />
    <rect x="20" y="50" width="60" height="20" rx="5" fill="#34d399" opacity="0.4" />
    <rect x="20" y="80" width="60" height="20" rx="5" fill="#34d399" opacity="0.2" />
  </g>

  <!-- The Harvester (for...of) -->
  <g transform="translate(180, 80)">
    <rect x="0" y="0" width="180" height="40" rx="20" fill="url(#harvesterGrad)" filter="url(#glow)" />
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">for (item of iterable)</text>
    <path d="M -40 50 L 0 20" stroke="#34d399" stroke-width="2" stroke-dasharray="2" />
  </g>

  <!-- The Expander (Spread Operator) -->
  <g transform="translate(180, 160)">
    <rect x="0" y="0" width="180" height="40" rx="20" fill="url(#harvesterGrad)" filter="url(#glow)" />
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">[...iterable]</text>
    <path d="M -40 -30 L 0 20" stroke="#34d399" stroke-width="2" stroke-dasharray="2" />
  </g>

  <text x="200" y="30" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE CONTENT HARVESTERS</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Consuming iterables automatically without manual pulling"</text>

</svg>
