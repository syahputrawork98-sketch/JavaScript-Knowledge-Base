<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iteratorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Pulling Mechanism (Control Unit) -->
  <g transform="translate(140, 60)">
    <rect x="0" y="0" width="120" height="80" rx="10" fill="#1e293b" stroke="#f472b6" stroke-width="2" />
    <text x="60" y="30" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">ITERATOR</text>
    
    <!-- Next Button -->
    <rect x="25" y="45" width="70" height="20" rx="10" fill="url(#iteratorGrad)" filter="url(#glow)" />
    <text x="60" y="58" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">NEXT()</text>
  </g>

  <!-- The Output Packet -->
  <g transform="translate(100, 180)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="#1e293b" stroke="#f472b6" stroke-width="1" opacity="0.6" />
    
    <!-- Value Field -->
    <rect x="20" y="20" width="160" height="20" rx="5" fill="#f472b6" opacity="0.2" />
    <text x="100" y="34" font-family="Courier, monospace" font-size="10" fill="#f472b6" text-anchor="middle">value: data_chunk</text>
    
    <!-- Done Field -->
    <rect x="20" y="50" width="160" height="20" rx="5" fill="#f472b6" opacity="0.2" />
    <text x="100" y="64" font-family="Courier, monospace" font-size="10" fill="#f472b6" text-anchor="middle">done: true/false</text>
  </g>

  <!-- Animation Arrows -->
  <path d="M 200 145 L 200 175" stroke="#f472b6" stroke-width="2" stroke-dasharray="4,2" />
  <path d="M 195 170 L 200 180 L 205 170" fill="none" stroke="#f472b6" stroke-width="2" />

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE SEQUENTIAL PULLER</text>
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Pulling data packets one by one with a precise state check"</text>

</svg>
