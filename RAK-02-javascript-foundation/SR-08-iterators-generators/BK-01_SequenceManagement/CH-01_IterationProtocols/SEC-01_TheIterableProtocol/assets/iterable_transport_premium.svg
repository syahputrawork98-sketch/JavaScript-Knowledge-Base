<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="transportGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Storage (Object) -->
  <rect x="50" y="80" width="120" height="140" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2" />
  <text x="110" y="105" font-family="Arial, sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle" font-weight="bold">OBJECT</text>

  <!-- The Protocol Gate ([Symbol.iterator]) -->
  <g transform="translate(140, 130)">
    <rect x="0" y="0" width="120" height="40" rx="5" fill="url(#transportGrad)" filter="url(#glow)" />
    <text x="60" y="25" font-family="Courier, monospace" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">[Symbol.iterator]</text>
    <text x="60" y="55" font-family="Arial, sans-serif" font-size="8" fill="#38bdf8" text-anchor="middle" font-weight="bold">THE GATEWAY</text>
  </g>

  <!-- The Conveyor Belt (Iteration Flow) -->
  <path d="M 260 150 L 380 150" stroke="#38bdf8" stroke-width="4" stroke-dasharray="8,4" />
  <circle cx="300" cy="150" r="10" fill="#38bdf8" opacity="0.6" />
  <circle cx="340" cy="150" r="10" fill="#38bdf8" opacity="0.4" />
  <circle cx="380" cy="150" r="10" fill="#38bdf8" opacity="0.2" />

  <!-- The Label -->
  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE UNIVERSAL TRANSPORT</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Opening the gateway for data to flow through the standard track"</text>

</svg>
