<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="genGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Generator Module (function*) -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="140" height="100" rx="10" fill="#1e293b" stroke="#f87171" stroke-width="2" />
    <text x="70" y="30" font-family="Courier, monospace" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">function*</text>
    
    <!-- Pulse Trigger -->
    <circle cx="70" cy="70" r="15" fill="url(#genGrad)" filter="url(#glow)" />
    <text x="70" y="74" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle" font-weight="bold">PULSE</text>
  </g>

  <!-- Connection Link -->
  <path d="M 210 110 L 260 110" stroke="#f87171" stroke-width="2" stroke-dasharray="4,2" />

  <!-- The Pulses (Yielded Values) -->
  <g transform="translate(260, 40)">
    <rect x="0" y="0" width="80" height="40" rx="5" fill="#f87171" opacity="0.6" />
    <text x="40" y="25" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Pulse 1</text>
    
    <rect x="0" y="60" width="80" height="40" rx="5" fill="#f87171" opacity="0.4" />
    <text x="40" y="85" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Pulse 2</text>
    
    <rect x="0" y="120" width="80" height="40" rx="5" fill="#f87171" opacity="0.2" />
    <text x="40" y="145" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Pulse 3</text>
  </g>

  <!-- Status Indicator: Pause/Resume -->
  <text x="130" y="200" font-family="Arial, sans-serif" font-size="12" fill="#f87171" font-weight="bold">STATUS: PAUSED</text>
  <text x="130" y="220" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">"Waiting for .next() to resume..."</text>

  <text x="200" y="30" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE PULSE GENERATOR</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Emitting data in controlled pulses, remembering state between bursts"</text>

</svg>
