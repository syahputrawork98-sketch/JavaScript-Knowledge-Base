<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="yieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f472b6" />
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Generator Internal -->
  <rect x="40" y="80" width="120" height="140" rx="10" fill="#1e293b" stroke="#f472b6" stroke-width="2" />
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="10" fill="#f472b6" text-anchor="middle" font-weight="bold">INTERNAL STATE</text>

  <!-- The Yield Gate (Regulator) -->
  <g transform="translate(140, 130)">
    <rect x="0" y="0" width="120" height="40" rx="5" fill="url(#yieldGrad)" filter="url(#glow)" />
    <text x="60" y="25" font-family="Courier, monospace" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">YIELD</text>
  </g>

  <!-- Output Flow (Generator -> Caller) -->
  <path d="M 265 140 L 360 140" stroke="#f472b6" stroke-width="3" marker-end="url(#arrow)" />
  <text x="310" y="130" font-family="Arial, sans-serif" font-size="10" fill="#f472b6" text-anchor="middle" font-weight="bold">OUTPUT</text>

  <!-- Input Flow (Caller -> Generator) -->
  <path d="M 360 160 L 265 160" stroke="#fb7185" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrow)" />
  <text x="310" y="180" font-family="Arial, sans-serif" font-size="10" fill="#fb7185" text-anchor="middle" font-weight="bold">INPUT</text>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE FLOW REGULATOR</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Managing bidirectional energy and information at suspension points"</text>

</svg>
