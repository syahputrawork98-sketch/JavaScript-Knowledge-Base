<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="asyncGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Remote Source (Cloud/Grid) -->
  <path d="M 50 100 Q 75 80 100 100 Q 125 70 150 100 Q 175 90 200 110 L 200 150 L 50 150 Z" fill="#1e293b" stroke="#818cf8" stroke-width="2" stroke-dasharray="4,2" />
  <text x="125" y="130" font-family="Arial, sans-serif" font-size="10" fill="#818cf8" text-anchor="middle" font-weight="bold">REMOTE HUB</text>

  <!-- The Buffer / Latency Gap -->
  <g transform="translate(220, 110)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#1e293b" stroke="#818cf8" stroke-width="2" />
    <text x="70" y="30" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">FOR AWAIT...OF</text>
    
    <!-- Pulse Packets with Delay Symbols -->
    <circle cx="30" cy="55" r="8" fill="#818cf8" opacity="1" filter="url(#glow)" />
    <circle cx="70" cy="55" r="8" fill="#818cf8" opacity="0.4" />
    <path d="M 65 55 L 75 55 M 70 50 L 70 60" stroke="#818cf8" stroke-width="2" opacity="0.4" /> <!-- Waiting Icon -->
    <circle cx="110" cy="55" r="8" fill="#818cf8" opacity="0.1" />
  </g>

  <!-- Connection Line -->
  <path d="M 170 130 L 220 130" stroke="#818cf8" stroke-width="2" marker-end="url(#arrowhead)" />

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE LATENCY COMPENSATOR</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Processing data as it arrives from remote sectors, one Promise at a time"</text>

</svg>
