<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="precGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Heavy Load Gauge (BigInt) -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="130" height="150" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2" />
    <text x="65" y="30" font-family="Arial, sans-serif" font-size="14" fill="#10b981" text-anchor="middle" font-weight="bold">BIGINT</text>
    
    <!-- Large Scale Indicator -->
    <path d="M 30 100 A 35 35 0 0 1 100 100" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" />
    <line x1="65" y1="100" x2="90" y2="80" stroke="#ffffff" stroke-width="3" stroke-linecap="round" filter="url(#glow)" />
    <text x="65" y="135" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">"64-bit + Capacity"</text>
  </g>

  <!-- The Atomic Stabilizer (Atomics) -->
  <g transform="translate(210, 80)">
    <rect x="0" y="0" width="130" height="150" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2" />
    <text x="65" y="30" font-family="Arial, sans-serif" font-size="14" fill="#10b981" text-anchor="middle" font-weight="bold">ATOMICS</text>
    
    <!-- Atomic Core -->
    <circle cx="65" cy="85" r="15" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="2,2" filter="url(#glow)" />
    <circle cx="65" cy="85" r="5" fill="#10b981" />
    <text x="65" y="135" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">"Secure Synchronization"</text>
  </g>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE HIGH-PRECISION GAUGES</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Handling astronomical integers and atomic-level thread safety"</text>

</svg>
