<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="watchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Target Object (The Vault) -->
  <g transform="translate(240, 80)">
    <rect x="0" y="0" width="100" height="140" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2" />
    <text x="50" y="75" font-family="Arial, sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle" font-weight="bold">TARGET</text>
    <text x="50" y="95" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">OBJECT</text>
  </g>

  <!-- The Proxy (The Watchman) -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" width="100" height="140" rx="10" fill="url(#watchGrad)" filter="url(#glow)" />
    <text x="50" y="75" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">PROXY</text>
    <text x="50" y="95" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.8">Handler Traps</text>
  </g>

  <!-- Interaction Flow -->
  <path d="M 180 150 L 240 150" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)" />
  <text x="210" y="140" font-family="Arial, sans-serif" font-size="10" fill="#38bdf8" text-anchor="middle">Reflect</text>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE WATCHMEN</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Intercepting every internal operation to enforce security and logic"</text>

</svg>
