<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="reflectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Mirror (Reflect Surface) -->
  <g transform="translate(100, 80)">
    <rect x="0" y="0" width="200" height="150" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="3" />
    <rect x="20" y="20" width="160" height="110" rx="5" fill="url(#reflectGrad)" opacity="0.3" filter="url(#glow)" />
    <text x="100" y="75" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="bold">REFLECT</text>
    <text x="100" y="100" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" opacity="0.8">Standardized Operations</text>
  </g>

  <!-- Method Markers -->
  <g transform="translate(60, 100)">
    <circle cx="0" cy="0" r="10" fill="#fbbf24" filter="url(#glow)" />
    <text x="-15" y="-5" font-family="Courier, monospace" font-size="8" fill="#fbbf24" text-anchor="end">.set()</text>
  </g>
  <g transform="translate(60, 160)">
    <circle cx="0" cy="0" r="10" fill="#fbbf24" filter="url(#glow)" />
    <text x="-15" y="-5" font-family="Courier, monospace" font-size="8" fill="#fbbf24" text-anchor="end">.get()</text>
  </g>
  <g transform="translate(340, 130)">
    <circle cx="0" cy="0" r="10" fill="#fbbf24" filter="url(#glow)" />
    <text x="15" y="-5" font-family="Courier, monospace" font-size="8" fill="#fbbf24" text-anchor="start">.apply()</text>
  </g>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE OFFICIAL RECORD</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"The companion protocol for performing object operations with reliability and ease"</text>

</svg>
