<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="errorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Fuse Box (Error Handling) -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="320" height="180" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,2" />
    <text x="160" y="30" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">EMERGENCY PROTOCOLS</text>

    <!-- Try Chamber -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="80" height="80" rx="5" fill="#1e293b" stroke="#94a3b8" stroke-width="1" />
      <text x="40" y="45" font-family="Courier, monospace" font-size="12" fill="#94a3b8" text-anchor="middle">try { ... }</text>
    </g>

    <!-- Catch Fuse -->
    <g transform="translate(120, 50)">
      <rect x="0" y="0" width="80" height="80" rx="5" fill="url(#errorGrad)" filter="url(#glow)" />
      <text x="40" y="45" font-family="Courier, monospace" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">catch</text>
      <path d="M 20 60 Q 40 70 60 60" fill="none" stroke="#ffffff" stroke-width="2" />
    </g>

    <!-- Finally Team -->
    <g transform="translate(220, 50)">
      <rect x="0" y="0" width="80" height="80" rx="5" fill="#1e293b" stroke="#10b981" stroke-width="2" />
      <text x="40" y="45" font-family="Courier, monospace" font-size="12" fill="#10b981" text-anchor="middle" font-weight="bold">finally</text>
    </g>
  </g>

  <!-- Error Chaining (The Cause) -->
  <g transform="translate(100, 240)">
    <circle cx="0" cy="0" r="15" fill="#ef4444" filter="url(#glow)" />
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">CAUSE</text>
    <path d="M 15 0 L 60 0" stroke="#ef4444" stroke-width="1" stroke-dasharray="2" />
    <circle cx="75" cy="0" r="15" fill="#ef4444" filter="url(#glow)" />
    <text x="75" y="5" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">ERROR</text>
    <text x="140" y="5" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">"Error Chaining (ES2022)"</text>
  </g>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE NESTED FUSES</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Isolating explosions and preserving the failure lineage"</text>

</svg>
