<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="modGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Modifier Hub (String.prototype) -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="320" height="180" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" />
    <text x="160" y="30" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">THE DATA MODIFIERS</text>
    
    <!-- Modifier Slots -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="80" height="40" rx="5" fill="url(#modGrad)" filter="url(#glow)" />
      <text x="40" y="25" font-family="Courier, monospace" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">.match()</text>
    </g>

    <g transform="translate(120, 50)">
      <rect x="0" y="0" width="80" height="40" rx="5" fill="url(#modGrad)" filter="url(#glow)" />
      <text x="40" y="25" font-family="Courier, monospace" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">.replace()</text>
    </g>

    <g transform="translate(220, 50)">
      <rect x="0" y="0" width="80" height="40" rx="5" fill="url(#modGrad)" filter="url(#glow)" />
      <text x="40" y="25" font-family="Courier, monospace" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">.split()</text>
    </g>

    <g transform="translate(70, 110)">
      <rect x="0" y="0" width="180" height="40" rx="5" fill="#1e293b" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,2" />
      <text x="90" y="25" font-family="Courier, monospace" font-size="12" fill="#8b5cf6" text-anchor="middle" font-weight="bold">.matchAll() [Iterator]</text>
    </g>
  </g>

  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Transforming, dividing, and extracting data streams using regex blueprints"</text>

</svg>
