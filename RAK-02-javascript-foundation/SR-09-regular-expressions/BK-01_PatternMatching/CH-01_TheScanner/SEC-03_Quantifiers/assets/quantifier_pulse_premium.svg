<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="quantGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Counter Module (Quantifiers) -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="280" height="150" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2" />
    <text x="140" y="30" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">PULSE COUNTER</text>
    
    <!-- Count Indicators -->
    <g transform="translate(20, 50)">
      <rect x="0" y="0" width="50" height="50" rx="5" fill="url(#quantGrad)" filter="url(#glow)" />
      <text x="25" y="35" font-family="Courier, monospace" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">+</text>
      <text x="25" y="65" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle" font-weight="bold">1 OR MORE</text>
    </g>

    <g transform="translate(85, 50)">
      <rect x="0" y="0" width="50" height="50" rx="5" fill="url(#quantGrad)" filter="url(#glow)" />
      <text x="25" y="35" font-family="Courier, monospace" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">*</text>
      <text x="25" y="65" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle" font-weight="bold">0 OR MORE</text>
    </g>

    <g transform="translate(145, 50)">
      <rect x="0" y="0" width="50" height="50" rx="5" fill="url(#quantGrad)" filter="url(#glow)" />
      <text x="25" y="35" font-family="Courier, monospace" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">?</text>
      <text x="25" y="65" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle" font-weight="bold">OPTIONAL</text>
    </g>

    <g transform="translate(210, 50)">
      <rect x="0" y="0" width="50" height="50" rx="5" fill="url(#quantGrad)" filter="url(#glow)" />
      <text x="25" y="35" font-family="Courier, monospace" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">{n,m}</text>
      <text x="25" y="65" font-family="Arial, sans-serif" font-size="7" fill="#f59e0b" text-anchor="middle" font-weight="bold">RANGE</text>
    </g>
  </g>

  <!-- Greediness Indicator -->
  <text x="200" y="235" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">"Default: Greedy (Match Max) | Lazy: Add '?' (Match Min)"</text>

  <text x="200" y="30" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE PULSE COUNTERS</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Controlling the volume and frequency of data matching patterns"</text>

</svg>
