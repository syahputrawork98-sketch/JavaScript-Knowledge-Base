<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="literalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="constructorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- Literal Scanner (The Preset) -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="140" height="180" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2" />
    <text x="70" y="30" font-family="Arial, sans-serif" font-size="12" fill="#10b981" text-anchor="middle" font-weight="bold">LITERAL (/.../)</text>
    
    <!-- Static Pattern -->
    <rect x="20" y="50" width="100" height="20" rx="5" fill="url(#literalGrad)" filter="url(#glow)" />
    <text x="70" y="64" font-family="Courier, monospace" font-size="9" fill="#ffffff" text-anchor="middle">/fixed_pattern/</text>
    
    <text x="70" y="100" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">"Pre-compiled at load"</text>
    <text x="70" y="115" font-family="Arial, sans-serif" font-size="9" fill="#10b981" text-anchor="middle" font-weight="bold">OPTIMIZED</text>
  </g>

  <!-- Constructor Scanner (The Dynamic) -->
  <g transform="translate(220, 60)">
    <rect x="0" y="0" width="140" height="180" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2" />
    <text x="70" y="30" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6" text-anchor="middle" font-weight="bold">CONSTRUCTOR (new)</text>
    
    <!-- Dynamic Assembly -->
    <rect x="20" y="50" width="100" height="20" rx="5" fill="url(#constructorGrad)" filter="url(#glow)" />
    <text x="70" y="64" font-family="Courier, monospace" font-size="9" fill="#ffffff" text-anchor="middle">new RegExp(var)</text>
    
    <text x="70" y="100" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">"Compiled at runtime"</text>
    <text x="70" y="115" font-family="Arial, sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle" font-weight="bold">FLEXIBLE</text>
  </g>

  <text x="200" y="30" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE PATTERN SCANNER</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Choosing between pre-set efficiency and dynamic versatility"</text>

</svg>
