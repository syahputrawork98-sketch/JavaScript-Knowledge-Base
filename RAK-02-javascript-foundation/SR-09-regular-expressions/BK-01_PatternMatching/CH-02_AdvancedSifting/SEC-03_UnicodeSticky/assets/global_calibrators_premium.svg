<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="calibGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Calibrator Unit (Flags) -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="320" height="180" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2" />
    <text x="160" y="30" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">GLOBAL CALIBRATORS</text>
    
    <!-- Calibration Dials (Flags) -->
    <g transform="translate(20, 50)">
      <circle cx="30" cy="30" r="25" fill="url(#calibGrad)" filter="url(#glow)" />
      <text x="30" y="38" font-family="Courier, monospace" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">u</text>
      <text x="30" y="75" font-family="Arial, sans-serif" font-size="8" fill="#6366f1" text-anchor="middle" font-weight="bold">UNICODE</text>
    </g>

    <g transform="translate(95, 50)">
      <circle cx="30" cy="30" r="25" fill="url(#calibGrad)" filter="url(#glow)" />
      <text x="30" y="38" font-family="Courier, monospace" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">y</text>
      <text x="30" y="75" font-family="Arial, sans-serif" font-size="8" fill="#6366f1" text-anchor="middle" font-weight="bold">STICKY</text>
    </g>

    <g transform="translate(170, 50)">
      <circle cx="30" cy="30" r="25" fill="url(#calibGrad)" filter="url(#glow)" />
      <text x="30" y="38" font-family="Courier, monospace" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">g</text>
      <text x="30" y="75" font-family="Arial, sans-serif" font-size="8" fill="#6366f1" text-anchor="middle" font-weight="bold">GLOBAL</text>
    </g>

    <g transform="translate(245, 50)">
      <circle cx="30" cy="30" r="25" fill="url(#calibGrad)" filter="url(#glow)" />
      <text x="30" y="38" font-family="Courier, monospace" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">i</text>
      <text x="30" y="75" font-family="Arial, sans-serif" font-size="8" fill="#6366f1" text-anchor="middle" font-weight="bold">IGNORE CASE</text>
    </g>
  </g>

  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Adjusting scanner precision and range for galactic data standards"</text>

</svg>
