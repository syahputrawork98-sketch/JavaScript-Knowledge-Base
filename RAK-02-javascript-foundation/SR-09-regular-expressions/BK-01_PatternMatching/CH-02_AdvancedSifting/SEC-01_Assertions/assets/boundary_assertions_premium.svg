<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="assertGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Grid (Data Stream) -->
  <rect x="40" y="110" width="320" height="40" rx="5" fill="#1e293b" stroke="#06b6d4" stroke-width="1" stroke-dasharray="4,2" />
  <text x="200" y="135" font-family="Courier, monospace" font-size="12" fill="#94a3b8" text-anchor="middle">data_stream_content</text>

  <!-- Anchors (Start/End) -->
  <g transform="translate(40, 90)">
    <path d="M 0 0 L 0 80" stroke="#06b6d4" stroke-width="2" stroke-dasharray="2" />
    <circle cx="0" cy="40" r="10" fill="url(#assertGrad)" filter="url(#glow)" />
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">^</text>
  </g>

  <g transform="translate(360, 90)">
    <path d="M 0 0 L 0 80" stroke="#06b6d4" stroke-width="2" stroke-dasharray="2" />
    <circle cx="0" cy="40" r="10" fill="url(#assertGrad)" filter="url(#glow)" />
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">$</text>
  </g>

  <!-- Lookaround (Scanner Eye) -->
  <g transform="translate(160, 180)">
    <path d="M 0 0 Q 40 -30 80 0" fill="none" stroke="#06b6d4" stroke-width="2" />
    <circle cx="40" cy="0" r="5" fill="#06b6d4" filter="url(#glow)" />
    <text x="40" y="25" font-family="Arial, sans-serif" font-size="10" fill="#06b6d4" text-anchor="middle" font-weight="bold">LOOKAHEAD (?=...)</text>
  </g>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE BOUNDARY PERIMETER</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Scanning positions instead of characters to define precise match perimeters"</text>

</svg>
