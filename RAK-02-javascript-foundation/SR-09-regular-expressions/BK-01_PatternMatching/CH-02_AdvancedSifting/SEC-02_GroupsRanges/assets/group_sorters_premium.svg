<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="groupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Sorter Frame (Modular Unit) -->
  <rect x="40" y="60" width="320" height="180" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="2" />
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE MODULAR SORTERS</text>

  <!-- Capturing Group Slot -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="120" height="60" rx="5" fill="url(#groupGrad)" filter="url(#glow)" />
    <text x="60" y="25" font-family="Courier, monospace" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">( ... )</text>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">CAPTURING GROUP</text>
  </g>

  <!-- Non-Capturing Group Slot -->
  <g transform="translate(200, 80)">
    <rect x="0" y="0" width="120" height="60" rx="5" fill="#1e293b" stroke="#ec4899" stroke-width="1" />
    <text x="60" y="25" font-family="Courier, monospace" font-size="14" fill="#ec4899" text-anchor="middle" font-weight="bold">(?: ... )</text>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">NON-CAPTURING</text>
  </g>

  <!-- Named Group Slot -->
  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="260" height="60" rx="5" fill="#1e293b" stroke="#ec4899" stroke-width="1" stroke-dasharray="4,2" />
    <text x="130" y="25" font-family="Courier, monospace" font-size="14" fill="#ec4899" text-anchor="middle" font-weight="bold">(?&lt;label&gt; ... )</text>
    <text x="130" y="45" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">NAMED CAPTURE GROUP</text>
  </g>

  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Isolating specific data segments into logical, reusable modules"</text>

</svg>
