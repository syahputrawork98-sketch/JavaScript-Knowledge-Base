<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="burstId" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Guarding Brackets (Parentheses) -->
  <g transform="translate(100, 100)">
    <path d="M 0 0 Q -20 50 0 100" stroke="#38bdf8" stroke-width="4" fill="none" />
    <path d="M 200 0 Q 220 50 200 100" stroke="#38bdf8" stroke-width="4" fill="none" />
    
    <!-- The Function being crushed/executed -->
    <rect x="30" y="20" width="140" height="60" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2" />
    <text x="100" y="55" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">FUNCTION</text>
  </g>

  <!-- The Trigger () -->
  <g transform="translate(310, 120)">
    <circle cx="20" cy="30" r="25" fill="#ef4444" filter="url(#glow)" />
    <text x="20" y="35" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">()</text>
    <text x="20" y="70" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle" font-weight="bold">TRIGGER</text>
  </g>

  <!-- The Burst Effect (Initialization) -->
  <circle cx="200" cy="150" r="80" fill="url(#burstId)" opacity="0.4">
    <animate attributeName="r" values="80;120;80" dur="2s" repeatCount="indefinite" />
  </circle>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE QUICK BURST UNITS</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Encapsulate, Execute, and Exit without leftovers"</text>

</svg>
