<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="restGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- Single Slots -->
  <g transform="translate(40, 60)">
    <rect x="0" y="0" width="50" height="50" rx="5" fill="#38bdf8" opacity="0.6" filter="url(#glow)" />
    <text x="25" y="30" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">ARG 1</text>
    <text x="25" y="65" font-family="Arial, sans-serif" font-size="9" fill="#38bdf8" text-anchor="middle">FIXED</text>
  </g>

  <g transform="translate(100, 60)">
    <rect x="0" y="0" width="50" height="50" rx="5" fill="#38bdf8" opacity="0.6" filter="url(#glow)" />
    <text x="25" y="30" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">ARG 2</text>
    <text x="25" y="65" font-family="Arial, sans-serif" font-size="9" fill="#38bdf8" text-anchor="middle">FIXED</text>
  </g>

  <!-- The Collector Bin (Rest Parameter) -->
  <g transform="translate(180, 60)">
    <rect x="0" y="0" width="180" height="180" rx="10" fill="url(#restGrad)" filter="url(#glow)" />
    <text x="90" y="90" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">...REST</text>
    <text x="90" y="115" font-family="Arial, sans-serif" font-size="10" fill="#e9d5ff" text-anchor="middle">COLLECTOR ARRAY</text>
    
    <!-- Items inside the collector -->
    <rect x="20" y="140" width="30" height="30" rx="3" fill="#ffffff" opacity="0.3" />
    <rect x="60" y="140" width="30" height="30" rx="3" fill="#ffffff" opacity="0.3" />
    <rect x="100" y="140" width="30" height="30" rx="3" fill="#ffffff" opacity="0.3" />
    <rect x="140" y="140" width="20" height="20" rx="3" fill="#ffffff" opacity="0.1" />
  </g>

  <!-- Input Flow Paths -->
  <path d="M 65 130 C 65 180 160 180 180 180" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrowhead)" />
  <path d="M 125 130 C 125 180 160 180 180 180" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arrowhead)" />

  <!-- Incoming Infinite Args -->
  <g transform="translate(380, 260)">
    <circle cx="0" cy="0" r="5" fill="#a78bfa" />
    <circle cx="-15" cy="0" r="5" fill="#a78bfa" />
    <circle cx="-30" cy="0" r="5" fill="#a78bfa" />
    <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite" />
  </g>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">REST PARAMETERS</text>
  <text x="200" y="270" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Capturing infinite tailing arguments into a single Array"</text>

</svg>
