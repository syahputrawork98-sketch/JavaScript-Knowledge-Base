<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainFuelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="backupFuelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Transformer Machine -->
  <rect x="120" y="80" width="160" height="140" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2" filter="url(#glow)" />
  <text x="200" y="150" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">TRANSFORMER</text>
  <text x="200" y="170" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Processing Unit</text>

  <!-- Input Port 1: Main Feed (Passing Argument) -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="40" height="30" rx="5" fill="url(#mainFuelGrad)" opacity="0.4" stroke="#38bdf8" stroke-dasharray="4" />
    <text x="20" y="20" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">VAL</text>
    <path d="M45 15 L75 15" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="20" y="-10" font-family="Arial, sans-serif" font-size="9" fill="#38bdf8" text-anchor="middle">MAIN FEED</text>
  </g>

  <!-- Input Port 2: Backup Generator (Default Param) -->
  <g transform="translate(40, 170)">
    <rect x="0" y="0" width="40" height="30" rx="5" fill="url(#backupFuelGrad)" filter="url(#glow)" />
    <text x="20" y="20" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">DEF</text>
    <path d="M45 15 L75 15" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="20" y="45" font-family="Arial, sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">BACKUP FUEL</text>
  </g>

  <!-- The Gate Logic -->
  <circle cx="100" cy="150" r="10" fill="#475569" stroke="#94a3b8" />
  <text x="100" y="154" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">?</text>

  <!-- Output Flow -->
  <path d="M280 150 L340 150" stroke="#34d399" stroke-width="3" marker-end="url(#arrowhead)" />
  <text x="340" y="140" font-family="Arial, sans-serif" font-size="10" fill="#34d399" text-anchor="middle">READY</text>

  <text x="200" y="50" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">DEFAULT PARAMETERS</text>
  <text x="200" y="270" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Automatic fallback for missing energy sources"</text>

</svg>
