<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="manifestGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdfbfb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f1f1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Clipboard -->
  <rect x="100" y="40" width="200" height="230" rx="5" fill="#a98467" stroke="#6c584c" stroke-width="2" />
  <rect x="160" y="30" width="80" height="20" rx="5" fill="#94a3b8" />

  <!-- The Paper (Manifest) -->
  <rect x="110" y="60" width="180" height="190" rx="2" fill="url(#manifestGradient)" filter="url(#shadow)" />
  
  <!-- Content Lines -->
  <text x="120" y="85" font-family="Courier, monospace" font-size="12" fill="#1e293b" font-weight="bold">{ "name": "hub-core" }</text>
  <rect x="120" y="100" width="160" height="1" fill="#94a3b8" opacity="0.5" />
  
  <text x="120" y="120" font-family="Courier, monospace" font-size="10" fill="#1e293b">"scripts": { ... }</text>
  <rect x="120" y="135" width="160" height="1" fill="#94a3b8" opacity="0.5" />

  <text x="120" y="155" font-family="Courier, monospace" font-size="10" fill="#cb3837" font-weight="bold">"dependencies": [✓]</text>
  <rect x="120" y="170" width="160" height="1" fill="#94a3b8" opacity="0.5" />

  <!-- The Seal -->
  <circle cx="260" cy="220" r="15" fill="#cb3837" opacity="0.8" />
  <text x="260" y="225" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">✓</text>

  <text x="200" y="50" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold" opacity="0.1">JSON</text>
  <text x="200" y="25" font-family="Arial, sans-serif" font-size="18" fill="url(#manifestGradient)" text-anchor="middle" font-weight="bold">LOGISTICS MANIFEST</text>

</svg>
