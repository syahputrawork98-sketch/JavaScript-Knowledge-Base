<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="npmGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cb3837;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb3e44;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Global Registry (Cloud) -->
  <g transform="translate(150, 40)">
    <path d="M25 50 Q0 50 0 25 Q0 0 25 0 Q25 0 50 0 Q75 0 75 25 Q75 50 50 50 Z" fill="url(#npmGradient)" filter="url(#glow)" />
    <path d="M45 50 Q70 50 70 25 Q70 0 95 0 Q120 0 120 25 Q120 50 95 50 Z" fill="url(#npmGradient)" filter="url(#glow)" />
    <text x="60" y="35" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">npm</text>
  </g>

  <!-- The Local Hub -->
  <rect x="150" y="200" width="100" height="60" rx="5" fill="#1e293b" stroke="#94a3b8" stroke-width="2" />
  <text x="200" y="235" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">LOCAL HUB</text>

  <!-- Delivery Parcels -->
  <g>
    <rect x="180" y="100" width="40" height="30" rx="3" fill="#ffffff" opacity="0.8" stroke="#cb3837" stroke-width="1" />
    <text x="200" y="120" font-family="Arial, sans-serif" font-size="8" fill="#1e293b" text-anchor="middle">v1.2.0</text>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 100" dur="2s" repeatCount="indefinite" />
  </g>

  <g transform="translate(40, -40)">
    <rect x="180" y="100" width="40" height="30" rx="3" fill="#ffffff" opacity="0.8" stroke="#cb3837" stroke-width="1" />
    <text x="200" y="120" font-family="Arial, sans-serif" font-size="8" fill="#1e293b" text-anchor="middle">v2.0.1</text>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 140" dur="2s" repeatCount="indefinite" />
  </g>

  <text x="200" y="180" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">GLOBAL STORE</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">"The World's Largest Registry Pipeline"</text>

</svg>
