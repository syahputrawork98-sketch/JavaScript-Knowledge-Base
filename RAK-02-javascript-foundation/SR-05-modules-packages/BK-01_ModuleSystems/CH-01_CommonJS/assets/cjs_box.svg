<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a373;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a98467;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Warehouse Box -->
  <g transform="translate(120, 100)">
    <rect x="0" y="0" width="160" height="120" rx="5" fill="url(#boxGradient)" stroke="#6c584c" stroke-width="2" filter="url(#glow)" />
    <path d="M0 40 L160 40 M40 40 L40 120 M120 40 L120 120" stroke="#6c584c" stroke-width="1" opacity="0.5" />
    <rect x="30" y="60" width="100" height="40" fill="#fefae0" rx="3" />
    <text x="80" y="85" font-family="Arial, sans-serif" font-size="14" fill="#6c584c" text-anchor="middle" font-weight="bold">MODULE</text>
  </g>

  <!-- The require() Forklift -->
  <g transform="translate(40, 180)">
    <rect x="0" y="0" width="40" height="10" fill="#facc15" />
    <rect x="30" y="-40" width="5" height="50" fill="#94a3b8" />
    <path d="M35 -30 L80 -30" stroke="#94a3b8" stroke-width="4" />
    <text x="20" y="25" font-family="Courier, monospace" font-size="12" fill="#facc15" text-anchor="middle">require()</text>
  </g>

  <text x="200" y="60" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">THE WAREHOUSE BOX</text>
  <text x="200" y="260" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">"Synchronous Module Loading (CJS)"</text>

</svg>
