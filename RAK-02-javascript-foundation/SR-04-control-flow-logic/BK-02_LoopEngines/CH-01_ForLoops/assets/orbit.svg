<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a18cd1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbc2eb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Central Hub -->
  <circle cx="200" cy="150" r="30" fill="url(#orbitGradient)" filter="url(#glow)" />
  <text x="200" y="210" font-family="Arial, sans-serif" font-size="12" fill="#fbc2eb" text-anchor="middle" font-weight="bold">FOR (INIT; COND; UP)</text>

  <!-- Orbit Path -->
  <circle cx="200" cy="150" r="80" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="5,5" />
  
  <!-- The Rotating Planet (Iteration) -->
  <g>
    <circle cx="200" cy="70" r="10" fill="#a18cd1" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="4s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Iteration Steps -->
  <text x="200" y="85" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Step 1</text>
  <text x="280" y="150" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Step 2</text>
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Step 3</text>
  <text x="120" y="150" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Step 4</text>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">THE ORBIT (FOR LOOP)</text>
  <text x="200" y="275" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">"Measured &amp; Measured Repetition"</text>

</svg>
