<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gateGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Main Input Path -->
  <path d="M20 150 L120 150" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrowhead)" />
  
  <!-- The Decision Junction -->
  <polygon points="120,130 160,150 120,170" fill="url(#gateGradient)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" />
  </polygon>
  <text x="140" y="200" font-family="Arial, sans-serif" font-size="12" fill="#00f2fe" text-anchor="middle" font-weight="bold">IF (CONDITION)</text>

  <!-- Branch TRUE -->
  <path d="M160 150 Q230 150 250 80" stroke="#38ef7d" stroke-width="4" fill="none" opacity="0.8" />
  <rect x="250" y="50" width="100" height="40" rx="5" fill="#1e293b" stroke="#38ef7d" stroke-width="2" />
  <text x="300" y="75" font-family="Arial, sans-serif" font-size="12" fill="#38ef7d" text-anchor="middle">EXECUTE A</text>
  <text x="210" y="100" font-family="Arial, sans-serif" font-size="10" fill="#38ef7d" text-anchor="middle">TRUE</text>

  <!-- Branch FALSE -->
  <path d="M160 150 Q230 150 250 220" stroke="#ef4444" stroke-width="4" fill="none" opacity="0.8" />
  <rect x="250" y="210" width="100" height="40" rx="5" fill="#1e293b" stroke="#ef4444" stroke-width="2" />
  <text x="300" y="235" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">EXECUTE B</text>
  <text x="210" y="210" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">FALSE</text>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">THE LOGIC GATE</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">"Condition-Based Path Selection"</text>

</svg>
