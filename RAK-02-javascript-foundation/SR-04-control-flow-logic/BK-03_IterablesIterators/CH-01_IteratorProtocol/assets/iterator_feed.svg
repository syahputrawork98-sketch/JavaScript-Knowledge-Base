<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="feedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Feed Reservoir -->
  <rect x="50" y="50" width="300" height="100" rx="10" fill="#1e293b" stroke="#FFD700" stroke-width="2" />
  <text x="200" y="110" font-family="Arial, sans-serif" font-size="22" fill="#FFD700" text-anchor="middle" font-weight="bold">ITERABLE DATA</text>

  <!-- The Feeding Mechanism -->
  <g transform="translate(200, 150)">
    <!-- Lever -->
    <rect x="-10" y="0" width="20" height="60" fill="#94a3b8" rx="5">
        <animateTransform attributeName="transform" type="rotate" values="0;45;0" dur="2s" repeatCount="indefinite" />
    </rect>
    <circle cx="0" cy="60" r="15" fill="#ef4444" filter="url(#glow)" />
    <text x="30" y="40" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">next()</text>
  </g>

  <!-- Output Bead -->
  <g transform="translate(200, 230)">
    <rect x="-60" y="-15" width="120" height="30" rx="15" fill="#1e293b" stroke="#38ef7d" stroke-width="2" filter="url(#glow)" />
    <text x="0" y="5" font-family="Courier, monospace" font-size="12" fill="#38ef7d" text-anchor="middle">{ value: "Data", done: false }</text>
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
  </g>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">THE MANUAL FEED</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">"Lazy Evaluation &amp; Custom Iteration"</text>

</svg>
