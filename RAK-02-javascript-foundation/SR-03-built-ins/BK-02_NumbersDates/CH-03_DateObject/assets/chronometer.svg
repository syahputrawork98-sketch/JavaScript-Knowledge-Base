<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dateGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Chronometer Body -->
  <circle cx="200" cy="150" r="100" fill="#1e293b" stroke="#ff9a9e" stroke-width="4" filter="url(#glow)" />
  
  <!-- Clock Face Markers -->
  <line x1="200" y1="60" x2="200" y2="80" stroke="#fecfef" stroke-width="2" />
  <line x1="200" y1="220" x2="200" y2="240" stroke="#fecfef" stroke-width="2" />
  <line x1="110" y1="150" x2="130" y2="150" stroke="#fecfef" stroke-width="2" />
  <line x1="270" y1="150" x2="290" y2="150" stroke="#fecfef" stroke-width="2" />

  <!-- Hands -->
  <line x1="200" y1="150" x2="240" y2="110" stroke="#ffffff" stroke-width="4" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="10s" repeatCount="indefinite" />
  </line>
  <line x1="200" y1="150" x2="200" y2="90" stroke="#ff9a9e" stroke-width="2" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="360 200 150" dur="60s" repeatCount="indefinite" />
  </line>

  <!-- Digital Display -->
  <rect x="150" y="175" width="100" height="25" rx="5" fill="#0f172a" stroke="#ff9a9e" stroke-width="1" />
  <text x="200" y="193" font-family="Courier, monospace" font-size="14" fill="#ff9a9e" text-anchor="middle">1711011367</text>
  
  <text x="200" y="45" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">CHRONOMETER</text>
  <text x="200" y="275" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Unix Epoch Tracking</text>

</svg>
