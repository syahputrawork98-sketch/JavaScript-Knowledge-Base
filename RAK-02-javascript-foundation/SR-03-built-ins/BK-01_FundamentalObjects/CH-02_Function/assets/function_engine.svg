<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Dynamic Gradient Definitions -->
  <defs>
    <linearGradient id="engineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6d365;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fda085;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4facfe" />
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />
  
  <!-- The Function Engine -->
  <rect x="120" y="80" width="160" height="120" rx="10" fill="url(#engineGradient)" filter="url(#glow)">
    <animate attributeName="y" values="80;75;80" dur="2s" repeatCount="indefinite" />
  </rect>
  
  <text x="200" y="140" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">FUNCTION</text>
  <text x="200" y="160" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">First-Class Engine</text>

  <!-- Input (Arguments) -->
  <path d="M40 140 L100 140" stroke="#4facfe" stroke-width="4" marker-end="url(#arrowhead)" />
  <circle cx="40" cy="140" r="10" fill="#4facfe" />
  <text x="40" y="125" font-family="Arial, sans-serif" font-size="10" fill="#4facfe" text-anchor="middle">INPUT</text>

  <!-- Output (Return) -->
  <path d="M300 140 L360 140" stroke="#00f2fe" stroke-width="4" />
  <polygon points="360,135 375,140 360,145" fill="#00f2fe" />
  <text x="360" y="125" font-family="Arial, sans-serif" font-size="10" fill="#00f2fe" text-anchor="middle">OUTPUT</text>

  <!-- Variable Storage (The Badge) -->
  <rect x="150" y="220" width="100" height="30" rx="15" fill="#1e293b" stroke="#f6d365" stroke-width="2" />
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="10" fill="#f6d365" text-anchor="middle">STORY IN VARIABLE</text>

</svg>
