<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="setGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38ef7d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#11998e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Verification Gate -->
  <rect x="150" y="80" width="100" height="180" rx="10" fill="#1e293b" stroke="#38ef7d" stroke-width="3" filter="url(#glow)" />
  <text x="200" y="275" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">SET GATE</text>

  <!-- Entering Unique Item -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="40" height="40" rx="5" fill="url(#setGradient)" />
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">A</text>
    <path d="M50 20 L100 20" stroke="#38ef7d" stroke-width="2" marker-end="url(#arrowhead)" />
  </g>

  <!-- Rejected Duplicate Item -->
  <g transform="translate(40, 180)">
    <rect x="0" y="0" width="40" height="40" rx="5" fill="#ef4444" opacity="0.6" />
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">A</text>
    <path d="M50 20 L90 20" stroke="#ef4444" stroke-width="2" />
    <text x="110" y="25" font-family="Arial, sans-serif" font-size="20" fill="#ef4444" font-weight="bold">✘</text>
  </g>

  <text x="200" y="60" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">VERIFICATION GATE</text>
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">"Redundant Data Rejection System"</text>

</svg>
