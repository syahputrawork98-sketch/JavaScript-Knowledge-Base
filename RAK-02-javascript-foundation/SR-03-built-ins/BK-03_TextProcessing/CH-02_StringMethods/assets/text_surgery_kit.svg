<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="kitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFDDC1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFABAB;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- Tool Box -->
  <rect x="50" y="80" width="300" height="180" rx="10" fill="#1e293b" stroke="#FFABAB" stroke-width="2" />
  <rect x="150" y="60" width="100" height="20" rx="5" fill="#FFABAB" />

  <!-- The Scalpel (Slice) -->
  <g transform="translate(80, 120)">
    <path d="M0 40 L40 0 L50 10 L10 50 Z" fill="#94a3b8" />
    <text x="25" y="65" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">SLICE</text>
  </g>

  <!-- The Brush (Trim) -->
  <g transform="translate(180, 120)">
    <rect x="0" y="20" width="40" height="30" fill="#facc15" />
    <path d="M0 20 Q20 0 40 20" stroke="#facc15" stroke-width="2" fill="none" />
    <text x="20" y="65" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">TRIM</text>
  </g>

  <!-- The Magnifier (Search) -->
  <g transform="translate(260, 120)">
    <circle cx="20" cy="20" r="18" stroke="#4facfe" stroke-width="3" fill="none" />
    <line x1="33" y1="33" x2="45" y2="45" stroke="#4facfe" stroke-width="5" stroke-linecap="round" />
    <text x="25" y="65" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">SEARCH</text>
  </g>

  <text x="200" y="235" font-family="Arial, sans-serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">TEXT SURGERY KIT</text>
  <text x="200" y="50" font-family="Arial, sans-serif" font-size="18" fill="url(#kitGradient)" text-anchor="middle" font-weight="bold">STRING METHODS</text>

</svg>
