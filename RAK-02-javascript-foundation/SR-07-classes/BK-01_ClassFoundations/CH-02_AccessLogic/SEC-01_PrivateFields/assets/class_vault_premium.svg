<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vaultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#475569;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Public Shell -->
  <rect x="40" y="60" width="320" height="180" rx="10" fill="url(#vaultGrad)" stroke="#64748b" stroke-width="2" />
  <text x="60" y="85" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" font-weight="bold">PUBLIC INTERFACE</text>

  <!-- The Internal Vault (Private) -->
  <g transform="translate(140, 100)">
    <rect x="0" y="0" width="120" height="100" rx="5" fill="#0f172a" stroke="#ef4444" stroke-width="3" filter="url(#glow)" />
    <text x="60" y="30" font-family="Arial, sans-serif" font-size="14" fill="#ef4444" text-anchor="middle" font-weight="bold"># PRIVATE</text>
    
    <!-- Lock Icon -->
    <path d="M 50 50 L 70 50 L 70 80 L 50 80 Z" fill="#ef4444" opacity="0.4" />
    <path d="M 55 50 Q 60 35 65 50" fill="none" stroke="#ef4444" stroke-width="2" />
    
    <text x="60" y="90" font-family="Arial, sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">"Hard Encapsulation"</text>
  </g>

  <!-- Blocked Access (External) -->
  <g transform="translate(350, 150)">
    <circle cx="0" cy="0" r="15" fill="#ef4444" opacity="0.2" />
    <path d="M -10 -10 L 10 10 M -10 10 L 10 -10" stroke="#ef4444" stroke-width="3" />
    <text x="-40" y="30" font-family="Arial, sans-serif" font-size="8" fill="#ef4444" text-anchor="end">External Access: DENIED</text>
  </g>

  <!-- Allowed Access (Internal) -->
  <path d="M 60 150 L 130 150" stroke="#34d399" stroke-width="2" stroke-dasharray="4,2" />
  <text x="65" y="145" font-family="Arial, sans-serif" font-size="8" fill="#34d399">In-class methods only</text>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE INTERNAL VAULT</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"True privacy for sensitive circuitry using the # prefix"</text>

</svg>
