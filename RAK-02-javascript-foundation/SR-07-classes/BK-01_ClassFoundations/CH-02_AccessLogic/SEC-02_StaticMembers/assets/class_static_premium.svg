<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="staticGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Class Body (The Headquarters) -->
  <rect x="40" y="60" width="320" height="200" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2" opacity="0.4" stroke-dasharray="5,5" />
  <text x="60" y="85" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" font-weight="bold">CLASS DEFINITION (HQ)</text>

  <!-- Static Members (Floating above) -->
  <g transform="translate(140, 40)">
    <rect x="0" y="0" width="120" height="60" rx="5" fill="url(#staticGrad)" filter="url(#glow)" />
    <text x="60" y="25" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">STATIC</text>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="9" fill="#78350f" text-anchor="middle">"The Shared Tool"</text>
  </g>

  <!-- Instances (On the field) -->
  <g transform="translate(80, 160)">
    <rect x="0" y="0" width="60" height="40" rx="5" fill="#38bdf8" opacity="0.6" />
    <text x="30" y="25" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">UNIT A</text>
    <path d="M 30 0 L 140 -60" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2" />
  </g>

  <g transform="translate(260, 160)">
    <rect x="0" y="0" width="60" height="40" rx="5" fill="#38bdf8" opacity="0.6" />
    <text x="30" y="25" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">UNIT B</text>
    <path d="M 30 0 L -60 -60" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2" />
  </g>

  <!-- The Rule -->
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">"Accessible via ClassName.member, NOT by Instance.member"</text>

  <text x="200" y="20" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE SHARED INFRASTRUCTURE</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Tools that belong to the factory, not the products"</text>

</svg>
