<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Internal State (Tank) -->
  <rect x="250" y="80" width="100" height="140" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2" />
  <text x="300" y="155" font-family="Arial, sans-serif" font-size="10" fill="#6366f1" text-anchor="middle" font-weight="bold">#PRIVATE_DATA</text>

  <!-- Setter Gatekeeper (Input) -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="120" height="40" rx="5" fill="url(#gateGrad)" filter="url(#glow)" />
    <text x="60" y="25" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">SETTER ()</text>
    <path d="M 120 20 L 250 140" stroke="#6366f1" stroke-width="2" stroke-dasharray="2" />
    <text x="60" y="55" font-family="Arial, sans-serif" font-size="8" fill="#a5b4fc" text-anchor="middle">"Validation &amp; Filtering"</text>
  </g>

  <!-- Getter Gatekeeper (Output) -->
  <g transform="translate(40, 180)">
    <rect x="0" y="0" width="120" height="40" rx="5" fill="url(#gateGrad)" filter="url(#glow)" />
    <text x="60" y="25" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">GETTER ()</text>
    <path d="M 120 20 L 250 160" stroke="#6366f1" stroke-width="2" stroke-dasharray="2" />
    <text x="60" y="55" font-family="Arial, sans-serif" font-size="8" fill="#a5b4fc" text-anchor="middle">"Formatting &amp; Reporting"</text>
  </g>

  <!-- Data Flow Arrows -->
  <path d="M 10 120 L 35 120" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M 35 200 L 10 200" stroke="#6366f1" stroke-width="2" />

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE SECURITY GATEKEEPERS</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Refining input and formatting output for protected state"</text>

</svg>
