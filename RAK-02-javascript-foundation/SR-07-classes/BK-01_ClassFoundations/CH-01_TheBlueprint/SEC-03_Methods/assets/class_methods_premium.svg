<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="methodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Class Instance (Machine) -->
  <rect x="50" y="80" width="300" height="140" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="2" />
  
  <!-- Internal State (The Core) -->
  <circle cx="100" cy="150" r="30" fill="#064e3b" stroke="#34d399" filter="url(#glow)" />
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">THIS.STATE</text>

  <!-- Operational Modules (Methods) -->
  <g transform="translate(180, 100)">
    <rect x="0" y="0" width="140" height="30" rx="5" fill="url(#methodGrad)" filter="url(#glow)" />
    <text x="70" y="20" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">ACTIVATE()</text>
    <path d="M 0 15 L -50 40" stroke="#34d399" stroke-width="2" stroke-dasharray="2" />
  </g>

  <g transform="translate(180, 140)">
    <rect x="0" y="0" width="140" height="30" rx="5" fill="url(#methodGrad)" filter="url(#glow)" />
    <text x="70" y="20" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">MONITOR()</text>
    <path d="M 0 15 L -50 10" stroke="#34d399" stroke-width="2" stroke-dasharray="2" />
  </g>

  <g transform="translate(180, 180)">
    <rect x="0" y="0" width="140" height="30" rx="5" fill="url(#methodGrad)" filter="url(#glow)" />
    <text x="70" y="20" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">DRAIN(val)</text>
    <path d="M 0 15 L -50 -10" stroke="#34d399" stroke-width="2" stroke-dasharray="2" />
  </g>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">OPERATIONAL CAPABILITIES</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Methods are the plug-in modules that let instances interact with their state"</text>

</svg>
