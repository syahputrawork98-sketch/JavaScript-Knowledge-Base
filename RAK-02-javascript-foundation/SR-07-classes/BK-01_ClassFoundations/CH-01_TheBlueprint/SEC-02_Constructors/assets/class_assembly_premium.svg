<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="assemblyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Assembly Line (Conveyor Belt) -->
  <rect x="20" y="200" width="360" height="40" rx="5" fill="#1e293b" stroke="#475569" />
  <rect x="40" y="210" width="20" height="20" fill="#334155" />
  <rect x="80" y="210" width="20" height="20" fill="#334155" />
  <rect x="120" y="210" width="20" height="20" fill="#334155" />
  <rect x="160" y="210" width="20" height="20" fill="#334155" />
  <rect x="200" y="210" width="20" height="20" fill="#334155" />
  <rect x="240" y="210" width="20" height="20" fill="#334155" />
  <rect x="280" y="210" width="20" height="20" fill="#334155" />

  <!-- The Constructor Robotic Arm -->
  <g transform="translate(150, 60)">
    <rect x="0" y="0" width="100" height="100" rx="10" fill="#1e293b" stroke="url(#assemblyGrad)" stroke-width="3" filter="url(#glow)" />
    <text x="50" y="30" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">CONSTRUCTOR</text>
    
    <!-- Injection Needle -->
    <path d="M 50 100 L 50 160" stroke="#f472b6" stroke-width="4" marker-end="url(#arrowhead)" />
    <text x="60" y="140" font-family="Arial, sans-serif" font-size="8" fill="#f472b6">Initialize this.unit</text>
  </g>

  <!-- Incoming Parameters -->
  <g transform="translate(40, 110)">
    <rect x="0" y="0" width="80" height="25" rx="5" fill="#38bdf8" opacity="0.6" />
    <text x="40" y="16" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">PARAMS (id, pwr)</text>
    <path d="M 85 15 L 140 100" stroke="#38bdf8" stroke-width="1" stroke-dasharray="2,2" />
  </g>

  <!-- Output Ready Instance -->
  <g transform="translate(260, 160)">
    <rect x="0" y="0" width="100" height="40" rx="5" fill="url(#assemblyGrad)" filter="url(#glow)" />
    <text x="50" y="25" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">READY OBJECT</text>
  </g>

  <text x="200" y="40" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE ASSEMBLY LINE</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Constructing state the moment the 'new' button is pressed"</text>

</svg>
