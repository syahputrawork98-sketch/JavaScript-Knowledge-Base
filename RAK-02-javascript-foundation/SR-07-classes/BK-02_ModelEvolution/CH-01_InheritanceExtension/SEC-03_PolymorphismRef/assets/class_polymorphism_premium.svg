<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="polyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e22ce;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Command (Common Interface) -->
  <g transform="translate(140, 40)">
    <rect x="0" y="0" width="120" height="40" rx="20" fill="#ffffff" filter="url(#glow)" />
    <text x="60" y="25" font-family="Arial, sans-serif" font-size="12" fill="#0f172a" text-anchor="middle" font-weight="bold">COMMAND: .act()</text>
  </g>

  <!-- Many Forms (Subclasses) -->
  
  <!-- Form A: Solar -->
  <g transform="translate(50, 140)">
    <rect x="0" y="0" width="80" height="80" rx="10" fill="url(#polyGrad)" stroke="#a855f7" stroke-width="2" />
    <path d="M 20 20 L 60 20 M 40 10 L 40 30" stroke="#fbbf24" stroke-width="2" /> <!-- Sun Icon -->
    <text x="40" y="60" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">SOLAR UNIT</text>
    <text x="40" y="72" font-family="Arial, sans-serif" font-size="7" fill="#e9d5ff" text-anchor="middle">deployPanels()</text>
    <path d="M 40 -60 L 100 -100" stroke="#a855f7" stroke-width="1" stroke-dasharray="2" />
  </g>

  <!-- Form B: Wind -->
  <g transform="translate(160, 140)">
    <rect x="0" y="0" width="80" height="80" rx="10" fill="url(#polyGrad)" stroke="#a855f7" stroke-width="2" />
    <circle cx="40" cy="30" r="15" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="4,2" /> <!-- Fan Icon -->
    <text x="40" y="60" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">WIND UNIT</text>
    <text x="40" y="72" font-family="Arial, sans-serif" font-size="7" fill="#e9d5ff" text-anchor="middle">spinTurbine()</text>
    <path d="M 40 -60 L 0 -100" stroke="#a855f7" stroke-width="1" stroke-dasharray="2" />
  </g>

  <!-- Form C: Battery -->
  <g transform="translate(270, 140)">
    <rect x="0" y="0" width="80" height="80" rx="10" fill="url(#polyGrad)" stroke="#a855f7" stroke-width="2" />
    <rect x="30" y="15" width="20" height="30" fill="#ffffff" opacity="0.4" /> <!-- Battery Icon -->
    <text x="40" y="60" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">BATTERY UNIT</text>
    <text x="40" y="72" font-family="Arial, sans-serif" font-size="7" fill="#e9d5ff" text-anchor="middle">releaseCurrent()</text>
    <path d="M 40 -60 L -100 -100" stroke="#a855f7" stroke-width="1" stroke-dasharray="2" />
  </g>

  <text x="200" y="20" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE ADAPTIVE INTERFACE</text>
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"One signal, many unique responses according to specialized design"</text>

</svg>
