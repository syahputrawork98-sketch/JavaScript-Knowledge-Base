<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="upgradeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- The Base Model (Parent) -->
  <g transform="translate(120, 40)">
    <rect x="0" y="0" width="160" height="80" rx="10" fill="url(#baseGrad)" stroke="#64748b" stroke-width="2" />
    <text x="80" y="30" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">BASE MODEL (Parent)</text>
    <text x="80" y="55" font-family="Arial, sans-serif" font-size="9" fill="#cbd5e1" text-anchor="middle">Standard Features (powerOn, off)</text>
  </g>

  <!-- Extends Connection (The Connector) -->
  <path d="M 200 120 L 200 160" stroke="#38bdf8" stroke-width="4" stroke-dasharray="4,2" />
  <text x="215" y="145" font-family="Arial, sans-serif" font-size="10" fill="#38bdf8" font-weight="bold">EXTENDS</text>

  <!-- The Upgraded Model (Child) -->
  <g transform="translate(80, 160)">
    <rect x="0" y="0" width="240" height="100" rx="10" fill="url(#upgradeGrad)" stroke="#0ea5e9" stroke-width="2" filter="url(#glow)" />
    <text x="120" y="30" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">UPGRADED SERIES (Child)</text>
    
    <!-- Inherited Features Indicator -->
    <rect x="20" y="50" width="200" height="10" fill="#ffffff" opacity="0.2" />
    <text x="120" y="58" font-family="Arial, sans-serif" font-size="8" fill="#ffffff" text-anchor="middle">INHERITED: Base Features</text>
    
    <!-- New Features Indicator -->
    <rect x="20" y="70" width="200" height="15" fill="#ffffff" opacity="0.4" />
    <text x="120" y="81" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">+ NEW: Advanced Modules</text>
  </g>

  <text x="200" y="20" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE MODULAR UPGRADE</text>
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Derived models inherit the foundation and build their excellence upon it"</text>

</svg>
