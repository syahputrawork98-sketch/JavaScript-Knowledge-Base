<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="parentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="childGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="400" height="300" rx="15" fill="#0f172a" />

  <!-- Parent Module -->
  <g transform="translate(120, 40)">
    <rect x="0" y="0" width="160" height="60" rx="10" fill="url(#parentGrad)" stroke="#64748b" stroke-width="2" />
    <text x="80" y="35" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">PARENT CLASS</text>
  </g>

  <!-- The Super Link (Cable) -->
  <g transform="translate(190, 100)">
    <rect x="0" y="0" width="20" height="80" fill="#38bdf8" filter="url(#glow)" />
    <path d="M 0 0 L 20 0 L 20 80 L 0 80 Z" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2" />
    <text x="30" y="45" font-family="Arial, sans-serif" font-size="12" fill="#38bdf8" font-weight="bold">SUPER()</text>
  </g>

  <!-- Child Instance (In Assembly) -->
  <g transform="translate(80, 180)">
    <rect x="0" y="0" width="240" height="80" rx="10" fill="url(#childGrad)" stroke="#0ea5e9" stroke-width="2" />
    <text x="120" y="30" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">CHILD (THIS)</text>
    <text x="120" y="55" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">"Waiting for parent systems..."</text>
  </g>

  <text x="200" y="20" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">THE UPLIFT LINK</text>
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">"Constructing the foundation via the Parent Link (super)"</text>

</svg>
