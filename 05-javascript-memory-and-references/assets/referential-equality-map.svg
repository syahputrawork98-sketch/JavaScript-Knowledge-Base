<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc"><title id="title">Referential Equality Visual</title><desc id="desc">Reference identity vs structural similarity in object comparisons.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fffaf4"/><stop offset="100%" stop-color="#eef6ff"/></linearGradient><linearGradient id="head" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#111827"/><stop offset="100%" stop-color="#1e40af"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/></filter><style>.h{fill:url(#head);rx:16;filter:url(#shadow)} .f{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:14;filter:url(#shadow)} .tbox{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:14;filter:url(#shadow)} .b{fill:#fff;stroke:#334155;stroke-width:2;rx:14;filter:url(#shadow)} .t{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#fff} .s{font:500 17px 'Segoe UI',sans-serif;fill:#dbeafe} .hh{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a} .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155} .x{font:600 13px 'Segoe UI',sans-serif;fill:#1f2937}</style></defs><rect width="1280" height="860" fill="url(#bg)"/><rect class="h" x="46" y="30" width="1188" height="118"/><text class="t" x="80" y="78">🆔 Referential Equality</text><text class="s" x="80" y="106">`===` untuk object membandingkan identity, bukan isi.</text><rect class="f" x="80" y="190" width="540" height="240"/><text class="hh" x="108" y="232">❌ a === b (false)</text><text class="p" x="108" y="260">Isi sama belum tentu reference sama.</text><rect class="tbox" x="660" y="190" width="540" height="240"/><text class="hh" x="688" y="232">✅ a === c (true)</text><text class="p" x="688" y="260">c menunjuk object yang sama dengan a.</text><rect class="b" x="80" y="470" width="1120" height="320"/><text class="hh" x="108" y="510">🧪 Penggunaan Praktis</text><text class="x" x="128" y="540">1. Cek perubahan state sering pakai reference comparison.</text><text class="x" x="128" y="566">2. Jika mutasi in-place, reference tidak berubah meski isi berubah.</text><text class="x" x="128" y="592">3. Untuk compare isi, perlu strategi tambahan.</text></svg>
