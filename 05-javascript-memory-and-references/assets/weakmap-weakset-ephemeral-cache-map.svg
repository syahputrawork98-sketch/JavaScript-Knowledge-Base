<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc"><title id="title">WeakMap WeakSet Visual</title><desc id="desc">WeakMap and WeakSet usage for ephemeral object metadata cache.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fffb"/><stop offset="100%" stop-color="#edf4ff"/></linearGradient><linearGradient id="head" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#0f766e"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/></filter><style>.h{fill:url(#head);rx:16;filter:url(#shadow)} .map{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2;rx:14;filter:url(#shadow)} .weak{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:14;filter:url(#shadow)} .b{fill:#fff;stroke:#334155;stroke-width:2;rx:14;filter:url(#shadow)} .t{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#fff} .s{font:500 17px 'Segoe UI',sans-serif;fill:#d1fae5} .hh{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a} .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155} .x{font:600 13px 'Segoe UI',sans-serif;fill:#1f2937}</style></defs><rect width="1280" height="860" fill="url(#bg)"/><rect class="h" x="46" y="30" width="1188" height="118"/><text class="t" x="80" y="78">🗺️ WeakMap / WeakSet</text><text class="s" x="80" y="106">Untuk metadata object sementara tanpa menahan lifecycle key.</text><rect class="map" x="80" y="190" width="540" height="240"/><text class="hh" x="108" y="232">📦 Map (strong key)</text><text class="p" x="108" y="260">Key ditahan kuat sampai dihapus manual.</text><text class="p" x="108" y="286">Risiko leak jika lupa cleanup.</text><rect class="weak" x="660" y="190" width="540" height="240"/><text class="hh" x="688" y="232">🍃 WeakMap (weak key)</text><text class="p" x="688" y="260">Key object bisa GC saat tak direferensikan.</text><text class="p" x="688" y="286">Cocok untuk metadata ephemeral.</text><rect class="b" x="80" y="470" width="1120" height="320"/><text class="hh" x="108" y="510">✅ Decision Rule</text><text class="x" x="128" y="540">1. Key perlu iterable/reporting? gunakan Map.</text><text class="x" x="128" y="566">2. Key object sementara + anti-leak? gunakan WeakMap.</text><text class="x" x="128" y="592">3. WeakMap hanya menerima key object, bukan primitive.</text></svg>
