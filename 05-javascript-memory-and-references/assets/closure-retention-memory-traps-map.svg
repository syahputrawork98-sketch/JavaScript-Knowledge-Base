<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc"><title id="title">Closure Retention Visual</title><desc id="desc">Closure retention traps and cleanup pattern visual map.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff8f8"/><stop offset="100%" stop-color="#eef6ff"/></linearGradient><linearGradient id="head" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7f1d1d"/><stop offset="100%" stop-color="#1e3a8a"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/></filter><style>.h{fill:url(#head);rx:16;filter:url(#shadow)} .risk{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:14;filter:url(#shadow)} .ok{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:14;filter:url(#shadow)} .b{fill:#fff;stroke:#334155;stroke-width:2;rx:14;filter:url(#shadow)} .t{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#fff} .s{font:500 17px 'Segoe UI',sans-serif;fill:#dbeafe} .hh{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a} .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155} .x{font:600 13px 'Segoe UI',sans-serif;fill:#1f2937}</style></defs><rect width="1280" height="860" fill="url(#bg)"/><rect class="h" x="46" y="30" width="1188" height="118"/><text class="t" x="80" y="78">🪤 Closure Retention Traps</text><text class="s" x="80" y="106">Callback hidup lama bisa menahan data besar lebih lama.</text><rect class="risk" x="80" y="190" width="540" height="240"/><text class="hh" x="108" y="232">⚠️ Trap</text><text class="p" x="108" y="260">Listener/interval menahan closure + captured data.</text><text class="p" x="108" y="286">Data tetap reachable walau secara bisnis selesai.</text><rect class="ok" x="660" y="190" width="540" height="240"/><text class="hh" x="688" y="232">✅ Fix</text><text class="p" x="688" y="260">Kurangi payload capture + cleanup lifecycle callback.</text><text class="p" x="688" y="286">removeEventListener / clearInterval saat dispose.</text><rect class="b" x="80" y="470" width="1120" height="320"/><text class="hh" x="108" y="510">🔍 Audit Checklist</text><text class="x" x="128" y="540">1. Callback long-lived apa saja yang aktif?</text><text class="x" x="128" y="566">2. Variabel besar apa yang tercapture?</text><text class="x" x="128" y="592">3. Dimana titik cleanup yang harus dipanggil?</text></svg>
