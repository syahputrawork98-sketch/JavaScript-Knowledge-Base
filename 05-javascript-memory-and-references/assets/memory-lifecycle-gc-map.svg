<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc"><title id="title">Memory Lifecycle Visual</title><desc id="desc">Allocate use release and GC flow with reachability.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fffef4"/><stop offset="100%" stop-color="#edf6ff"/></linearGradient><linearGradient id="head" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/></filter><style>.h{fill:url(#head);rx:16;filter:url(#shadow)} .b{fill:#fff;stroke:#334155;stroke-width:2;rx:14;filter:url(#shadow)} .a{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2;rx:14;filter:url(#shadow)} .g{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:14;filter:url(#shadow)} .r{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:14;filter:url(#shadow)} .t{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#fff} .s{font:500 17px 'Segoe UI',sans-serif;fill:#dbeafe} .hh{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a} .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155} .x{font:600 13px 'Segoe UI',sans-serif;fill:#1f2937}</style></defs><rect width="1280" height="860" fill="url(#bg)"/><rect class="h" x="46" y="30" width="1188" height="118"/><text class="t" x="80" y="78">🧠 Memory Lifecycle &amp; GC</text><text class="s" x="80" y="106">Alur: allocate -> use -> release -> eligible for GC</text><rect class="a" x="80" y="190" width="360" height="200"/><text class="hh" x="106" y="232">1️⃣ Allocate</text><text class="p" x="106" y="258">Object dibuat di heap.</text><rect class="a" x="460" y="190" width="360" height="200"/><text class="hh" x="486" y="232">2️⃣ Use</text><text class="p" x="486" y="258">Data dipakai selama reachable.</text><rect class="g" x="840" y="190" width="360" height="200"/><text class="hh" x="866" y="232">3️⃣ Release</text><text class="p" x="866" y="258">Reference dilepas saat selesai.</text><rect class="r" x="80" y="430" width="1120" height="120"/><text class="hh" x="106" y="470">⚠️ Leak jika reference tertahan</text><text class="p" x="106" y="496">Objek tetap reachable => GC tidak bisa membersihkan.</text><rect class="b" x="80" y="590" width="1120" height="220"/><text class="hh" x="106" y="630">✅ Debug Rule</text><text class="x" x="126" y="658">1. Cari retention path yang menahan object.</text><text class="x" x="126" y="684">2. Lepas listener/interval/cache saat dispose.</text><text class="x" x="126" y="710">3. Object eligible GC hanya saat tidak reachable.</text></svg>
