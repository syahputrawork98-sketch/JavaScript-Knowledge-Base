<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Sequential vs Parallel Visual</title>
  <desc id="desc">Emoji decision board for sequential and parallel async execution.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fffef2"/><stop offset="100%" stop-color="#edf6ff"/></linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#0c4a6e"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <style>.head{fill:url(#head);rx:16;filter:url(#shadow)} .seq{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:14;filter:url(#shadow)} .par{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:14;filter:url(#shadow)} .box{fill:#fff;stroke:#334155;stroke-width:2;rx:14;filter:url(#shadow)} .title{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#fff} .sub{font:500 17px 'Segoe UI',sans-serif;fill:#dbeafe} .h{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a} .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155} .s{font:600 13px 'Segoe UI',sans-serif;fill:#1f2937}</style>
  </defs>
  <rect width="1280" height="860" fill="url(#bg)"/>
  <rect class="head" x="46" y="30" width="1188" height="118"/>
  <text class="title" x="80" y="78">🚦 Sequential vs Parallel</text>
  <text class="sub" x="80" y="106">Pilih berdasarkan dependency data, bukan kebiasaan.</text>

  <rect class="seq" x="80" y="190" width="540" height="260"/>
  <text class="h" x="108" y="232">🐢 Sequential</text>
  <text class="p" x="108" y="260">Task berjalan satu per satu.</text>
  <text class="p" x="108" y="286">Cocok jika langkah B butuh hasil A.</text>

  <rect class="par" x="660" y="190" width="540" height="260"/>
  <text class="h" x="688" y="232">🚀 Parallel (Promise.all)</text>
  <text class="p" x="688" y="260">Task independen jalan bersamaan.</text>
  <text class="p" x="688" y="286">Lebih cepat untuk beban non-dependent.</text>

  <rect class="box" x="80" y="490" width="1120" height="300"/>
  <text class="h" x="108" y="530">✅ Rule Pilihan</text>
  <text class="s" x="128" y="560">1. Ada dependency hasil antar task? pakai sequential.</text>
  <text class="s" x="128" y="586">2. Tidak ada dependency? pakai parallel.</text>
  <text class="s" x="128" y="612">3. Perlu partial success? pertimbangkan allSettled.</text>
</svg>
