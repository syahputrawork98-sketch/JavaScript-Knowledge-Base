  <text x="64" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Forms</text>
  <text x="64" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- declaration</text>
  <text x="64" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- expression</text>
  <text x="64" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- named expression</text>
  <text x="252" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Strict</text>
  <text x="252" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- tighter syntax</text>
  <text x="252" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- reserved words matter</text>
  <text x="252" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- cleaner semantics</text>
  <text x="440" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Effect</text>
  <text x="440" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- predictable body rules</text>
  <text x="440" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- fewer hidden traps</text>
  <text x="440" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- stable base for runtime</text>
