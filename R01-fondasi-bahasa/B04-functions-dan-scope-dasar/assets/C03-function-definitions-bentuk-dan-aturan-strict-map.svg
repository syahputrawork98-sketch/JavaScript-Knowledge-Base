  <text x="48" y="62" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">C03 Function Definitions dan Aturan Strict</text>
  <text x="48" y="92" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">Declaration forms -> strict constraints -> safer function bodies</text>
