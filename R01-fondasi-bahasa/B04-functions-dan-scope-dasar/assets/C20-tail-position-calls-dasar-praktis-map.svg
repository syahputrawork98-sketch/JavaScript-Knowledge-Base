<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="640" height="360" fill="#fafaf9"/>
  <rect x="24" y="24" width="592" height="312" rx="20" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="48" y="62" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">C20 Tail Position Calls Dasar Praktis</text>
  <text x="48" y="92" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">Return directly -> no extra work after call -> tail style reading</text>
  <rect x="48" y="124" width="168" height="156" rx="16" fill="#e7e5e4"/>
  <rect x="236" y="124" width="168" height="156" rx="16" fill="#fde68a"/>
  <rect x="424" y="124" width="168" height="156" rx="16" fill="#bbf7d0"/>
  <text x="64" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Tail</text>
  <text x="64" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- result is direct return</text>
  <text x="64" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- no extra operator</text>
  <text x="64" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- end of evaluation path</text>
  <text x="252" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Not Tail</text>
  <text x="252" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- call plus more work</text>
  <text x="252" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- operator after call</text>
  <text x="252" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- not final result yet</text>
  <text x="440" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Practical</text>
  <text x="440" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- reason about recursion</text>
  <text x="440" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- read return structure</text>
  <text x="440" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- separate concept from engine</text>
</svg>
