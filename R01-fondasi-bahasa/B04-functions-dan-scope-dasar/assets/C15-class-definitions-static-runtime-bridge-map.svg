<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="640" height="360" fill="#fdf4ff"/>
  <rect x="24" y="24" width="592" height="312" rx="20" fill="#fffefe" stroke="#1f2937" stroke-width="2"/>
  <text x="48" y="62" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">C15 Class Static Runtime Bridge</text>
  <text x="48" y="92" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">Validated shape -> computed names -> runtime class building</text>
  <rect x="48" y="124" width="168" height="156" rx="16" fill="#f5d0fe"/>
  <rect x="236" y="124" width="168" height="156" rx="16" fill="#fde68a"/>
  <rect x="424" y="124" width="168" height="156" rx="16" fill="#bfdbfe"/>
  <text x="64" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Bridge</text>
  <text x="64" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- static checks first</text>
  <text x="64" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- valid class continues</text>
  <text x="64" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- runtime can start</text>
  <text x="252" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Evaluate</text>
  <text x="252" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- computed keys run</text>
  <text x="252" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- extends can run</text>
  <text x="252" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- static init fires</text>
  <text x="440" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Observe</text>
  <text x="440" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- names are timed</text>
  <text x="440" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- class expression scope</text>
  <text x="440" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- runtime effects are real</text>
</svg>
