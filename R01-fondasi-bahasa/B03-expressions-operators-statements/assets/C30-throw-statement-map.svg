  <line x1="300" y1="150" x2="350" y2="150" stroke="#334155" stroke-width="3"/>
  <polygon points="350,150 338,143 338,157" fill="#334155"/>
  <line x1="590" y1="150" x2="640" y2="150" stroke="#334155" stroke-width="3"/>
  <polygon points="640,150 628,143 628,157" fill="#334155"/>
  <line x1="880" y1="150" x2="930" y2="150" stroke="#334155" stroke-width="3"/>
