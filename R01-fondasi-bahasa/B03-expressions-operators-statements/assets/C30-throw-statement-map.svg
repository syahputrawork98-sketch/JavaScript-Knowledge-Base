  <text x="90" y="350" font-family="Consolas, monospace" font-size="22" fill="#1e293b">throw new Error("invalid input")</text>
  <text x="90" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Gunakan snippet ini untuk menelusuri jalur control flow.</text>

  <rect x="610" y="250" width="530" height="320" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="640" y="300" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Poin Inti</text>
  <text x="640" y="350" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">1. throw menghentikan flow normal dan melempar sinyal error.</text>
  <text x="640" y="395" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. Error object lebih jelas dibanding lempar string mentah.</text>
  <text x="640" y="440" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. Validasi boundary function adalah lokasi throw yang ideal.</text>
