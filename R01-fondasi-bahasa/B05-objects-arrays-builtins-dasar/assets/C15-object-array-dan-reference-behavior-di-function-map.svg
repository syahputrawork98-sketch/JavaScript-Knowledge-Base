<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">C15 Object, Array, dan Reference Behavior di Function Map</text>

  <rect x="60" y="110" width="250" height="100" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="104" y="153" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">Data Asli</text>
  <text x="110" y="183" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1e3a8a">object / array</text>

  <rect x="370" y="110" width="220" height="100" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="438" y="153" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#991b1b">Function</text>
  <text x="405" y="183" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#991b1b">bisa memutasi</text>

  <rect x="650" y="110" width="220" height="100" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="716" y="153" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#92400e">Efek</text>
  <text x="676" y="183" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#92400e">terlihat di luar</text>

  <rect x="930" y="110" width="210" height="100" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="987" y="153" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#166534">Salinan</text>
  <text x="963" y="183" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#166534">untuk kasus dasar</text>

  <line x1="310" y1="160" x2="370" y2="160" stroke="#334155" stroke-width="3"/>
  <polygon points="370,160 358,153 358,167" fill="#334155"/>
  <line x1="590" y1="160" x2="650" y2="160" stroke="#334155" stroke-width="3"/>
  <polygon points="650,160 638,153 638,167" fill="#334155"/>
  <line x1="870" y1="160" x2="930" y2="160" stroke="#334155" stroke-width="3"/>
  <polygon points="930,160 918,153 918,167" fill="#334155"/>

  <rect x="60" y="260" width="500" height="290" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Contoh Mutasi</text>
  <text x="90" y="355" font-family="Consolas, monospace" font-size="20" fill="#1e293b">function addFruit(list) {</text>
  <text x="90" y="390" font-family="Consolas, monospace" font-size="20" fill="#1e293b">  list.push('mango');</text>
  <text x="90" y="425" font-family="Consolas, monospace" font-size="20" fill="#1e293b">}</text>
  <text x="90" y="475" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">list dan fruits menunjuk data yang sama.</text>

  <rect x="610" y="260" width="530" height="290" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="640" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Poin Inti</text>
  <text x="640" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">1. Object/array bisa berubah di luar function jika dimutasi di dalam.</text>
  <text x="640" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. Reference behavior menjelaskan kenapa perubahan terasa menyebar.</text>
  <text x="640" y="445" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. Salinan dangkal seperti slice membantu pada kasus array satu lapis.</text>
  <text x="640" y="490" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">4. Nama function perlu jujur: membaca atau mengubah data.</text>
</svg>
