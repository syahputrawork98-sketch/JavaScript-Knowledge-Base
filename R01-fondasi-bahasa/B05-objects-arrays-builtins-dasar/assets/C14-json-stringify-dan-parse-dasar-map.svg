<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">C14 JSON stringify dan parse Dasar Map</text>

  <rect x="60" y="110" width="260" height="100" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="121" y="153" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">Data JS</text>
  <text x="106" y="183" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1e3a8a">object / array</text>

  <rect x="390" y="110" width="220" height="100" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="430" y="153" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#166534">stringify</text>
  <text x="433" y="183" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#166534">jadi teks</text>

  <rect x="680" y="110" width="220" height="100" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="748" y="153" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#92400e">JSON</text>
  <text x="724" y="183" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#92400e">string teks</text>

  <rect x="970" y="110" width="170" height="100" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="1012" y="153" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#991b1b">parse</text>
  <text x="996" y="183" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#991b1b">balik jadi data</text>

  <line x1="320" y1="160" x2="390" y2="160" stroke="#334155" stroke-width="3"/>
  <polygon points="390,160 378,153 378,167" fill="#334155"/>
  <line x1="610" y1="160" x2="680" y2="160" stroke="#334155" stroke-width="3"/>
  <polygon points="680,160 668,153 668,167" fill="#334155"/>
  <line x1="900" y1="160" x2="970" y2="160" stroke="#334155" stroke-width="3"/>
  <polygon points="970,160 958,153 958,167" fill="#334155"/>

  <rect x="60" y="260" width="500" height="290" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Contoh Alur</text>
  <text x="90" y="355" font-family="Consolas, monospace" font-size="20" fill="#1e293b">const user = { name: 'Alya', age: 21 };</text>
  <text x="90" y="400" font-family="Consolas, monospace" font-size="20" fill="#1e293b">const text = JSON.stringify(user);</text>
  <text x="90" y="445" font-family="Consolas, monospace" font-size="20" fill="#1e293b">const parsed = JSON.parse(text);</text>
  <text x="90" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Bedakan object di memori dengan string JSON.</text>

  <rect x="610" y="260" width="530" height="290" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="640" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Poin Inti</text>
  <text x="640" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">1. stringify mengubah data menjadi teks JSON.</text>
  <text x="640" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. parse mengubah teks JSON valid menjadi data JavaScript.</text>
  <text x="640" y="445" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. JSON cocok untuk perpindahan data sederhana dan terstruktur.</text>
  <text x="640" y="490" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">4. Salah membedakan teks vs data sering memicu bug pemula.</text>
</svg>
