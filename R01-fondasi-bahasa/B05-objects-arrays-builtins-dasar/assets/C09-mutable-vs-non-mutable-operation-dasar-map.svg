<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">C09 Mutable vs Non-Mutable Operation Dasar Map</text>

  <rect x="60" y="110" width="500" height="120" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="90" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#991b1b">Mutable</text>
  <text x="90" y="192" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#991b1b">push, pop, shift, unshift</text>
  <text x="90" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#991b1b">array asli berubah</text>

  <rect x="640" y="110" width="500" height="120" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="670" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#166534">Non-Mutable</text>
  <text x="670" y="192" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#166534">map, filter, slice, concat</text>
  <text x="670" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#166534">hasil baru dibuat</text>

  <rect x="60" y="280" width="500" height="260" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Contoh Mutable</text>
  <text x="90" y="375" font-family="Consolas, monospace" font-size="20" fill="#1e293b">const fruits = ['apple', 'banana'];</text>
  <text x="90" y="415" font-family="Consolas, monospace" font-size="20" fill="#1e293b">fruits.push('mango');</text>
  <text x="90" y="465" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Sebelum: ['apple', 'banana']</text>
  <text x="90" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Sesudah: ['apple', 'banana', 'mango']</text>

  <rect x="640" y="280" width="500" height="260" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="670" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Contoh Non-Mutable</text>
  <text x="670" y="375" font-family="Consolas, monospace" font-size="20" fill="#1e293b">const numbers = [1, 2, 3];</text>
  <text x="670" y="415" font-family="Consolas, monospace" font-size="20" fill="#1e293b">const doubled = numbers.map(n =&gt; n * 2);</text>
  <text x="670" y="465" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">numbers tetap: [1, 2, 3]</text>
  <text x="670" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">hasil baru: [2, 4, 6]</text>
</svg>
