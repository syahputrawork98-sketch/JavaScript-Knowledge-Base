<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">C05 Array Literal, Index, length, dan Update Map</text>

  <rect x="60" y="110" width="250" height="90" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="104" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1e3a8a">Array Literal</text>
  <text x="100" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1e3a8a">daftar berurutan</text>

  <rect x="360" y="110" width="220" height="90" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="426" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#166534">Index</text>
  <text x="399" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#166534">mulai dari 0</text>

  <rect x="630" y="110" width="220" height="90" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="695" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#92400e">length</text>
  <text x="675" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#92400e">ukuran logis</text>

  <rect x="900" y="110" width="240" height="90" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="965" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#991b1b">Update</text>
  <text x="935" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#991b1b">mutasi elemen</text>

  <line x1="310" y1="155" x2="360" y2="155" stroke="#334155" stroke-width="3"/>
  <polygon points="360,155 348,148 348,162" fill="#334155"/>
  <line x1="580" y1="155" x2="630" y2="155" stroke="#334155" stroke-width="3"/>
  <polygon points="630,155 618,148 618,162" fill="#334155"/>
  <line x1="850" y1="155" x2="900" y2="155" stroke="#334155" stroke-width="3"/>
  <polygon points="900,155 888,148 888,162" fill="#334155"/>

  <rect x="60" y="250" width="500" height="300" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Contoh Struktur</text>
  <text x="90" y="345" font-family="Consolas, monospace" font-size="21" fill="#1e293b">const fruits = ['apple', 'banana', 'mango'];</text>
  <rect x="90" y="385" width="110" height="54" rx="8" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="127" y="418" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1e3a8a">0</text>
  <rect x="215" y="385" width="110" height="54" rx="8" fill="#dcfce7" stroke="#4ade80"/>
  <text x="252" y="418" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#166534">1</text>
  <rect x="340" y="385" width="110" height="54" rx="8" fill="#fef3c7" stroke="#fbbf24"/>
  <text x="377" y="418" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#92400e">2</text>
  <text x="90" y="485" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">fruits.length === 3</text>

  <rect x="610" y="250" width="530" height="300" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="640" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Poin Inti</text>
  <text x="640" y="345" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">1. Array cocok untuk data berurutan, bukan data bernama.</text>
  <text x="640" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. Akses elemen memakai index yang dimulai dari 0.</text>
  <text x="640" y="435" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. length membantu membaca ukuran logis array.</text>
  <text x="640" y="480" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">4. Mengubah fruits[1] berarti memutasi array yang sama.</text>
</svg>
