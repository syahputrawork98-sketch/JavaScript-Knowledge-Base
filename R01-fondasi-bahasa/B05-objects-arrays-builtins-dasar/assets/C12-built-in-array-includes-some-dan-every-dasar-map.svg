<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">C12 Built-in Array includes, some, dan every Dasar Map</text>

  <rect x="60" y="110" width="240" height="95" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="123" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">includes</text>
  <text x="92" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1e3a8a">nilai ini ada?</text>

  <rect x="350" y="110" width="240" height="95" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="430" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#166534">some</text>
  <text x="384" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#166534">ada yang lolos?</text>

  <rect x="640" y="110" width="240" height="95" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="717" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#92400e">every</text>
  <text x="678" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#92400e">semua lolos?</text>

  <rect x="930" y="110" width="210" height="95" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="991" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#991b1b">Output</text>
  <text x="995" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#991b1b">boolean</text>

  <line x1="300" y1="158" x2="350" y2="158" stroke="#334155" stroke-width="3"/>
  <polygon points="350,158 338,151 338,165" fill="#334155"/>
  <line x1="590" y1="158" x2="640" y2="158" stroke="#334155" stroke-width="3"/>
  <polygon points="640,158 628,151 628,165" fill="#334155"/>
  <line x1="880" y1="158" x2="930" y2="158" stroke="#334155" stroke-width="3"/>
  <polygon points="930,158 918,151 918,165" fill="#334155"/>

  <rect x="60" y="260" width="500" height="290" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Pertanyaan Ya/Tidak</text>
  <text x="90" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">includes: "banana ada?"</text>
  <text x="90" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">some: "ada nilai >= 80?"</text>
  <text x="90" y="445" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">every: "semua nilai >= 60?"</text>
  <text x="90" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Tiga method ini menjawab kondisi, bukan membuat array baru.</text>

  <rect x="610" y="260" width="530" height="290" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="640" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Poin Inti</text>
  <text x="640" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">1. includes mengecek nilai tertentu.</text>
  <text x="640" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. some mengecek apakah minimal satu elemen memenuhi kondisi.</text>
  <text x="640" y="445" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. every mengecek apakah semua elemen memenuhi kondisi.</text>
  <text x="640" y="490" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">4. Ketiganya menghasilkan boolean, bukan array.</text>
</svg>
