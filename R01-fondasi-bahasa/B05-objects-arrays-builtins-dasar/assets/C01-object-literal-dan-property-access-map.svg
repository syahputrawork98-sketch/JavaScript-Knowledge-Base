<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">C01 Object Literal dan Property Access Map</text>

  <rect x="60" y="110" width="250" height="90" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="94" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1e3a8a">Object Literal</text>
  <text x="94" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1e3a8a">key-value bernama</text>

  <rect x="360" y="110" width="220" height="90" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="421" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#166534">Dot</text>
  <text x="393" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#166534">nama tetap</text>

  <rect x="630" y="110" width="220" height="90" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="696" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#92400e">Bracket</text>
  <text x="666" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#92400e">nama dinamis</text>

  <rect x="900" y="110" width="240" height="90" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="953" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#991b1b">Hasil</text>
  <text x="938" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#991b1b">nilai property</text>

  <line x1="310" y1="155" x2="360" y2="155" stroke="#334155" stroke-width="3"/>
  <polygon points="360,155 348,148 348,162" fill="#334155"/>
  <line x1="580" y1="155" x2="630" y2="155" stroke="#334155" stroke-width="3"/>
  <polygon points="630,155 618,148 618,162" fill="#334155"/>
  <line x1="850" y1="155" x2="900" y2="155" stroke="#334155" stroke-width="3"/>
  <polygon points="900,155 888,148 888,162" fill="#334155"/>

  <rect x="60" y="250" width="470" height="300" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Contoh Akses</text>
  <text x="90" y="345" font-family="Consolas, monospace" font-size="21" fill="#1e293b">const user = { name: 'Alya', age: 21 };</text>
  <text x="90" y="390" font-family="Consolas, monospace" font-size="21" fill="#1e293b">user.name;</text>
  <text x="90" y="430" font-family="Consolas, monospace" font-size="21" fill="#1e293b">user['age'];</text>
  <text x="90" y="470" font-family="Consolas, monospace" font-size="21" fill="#1e293b">user[fieldName];</text>

  <rect x="580" y="250" width="560" height="300" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="610" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Poin Inti</text>
  <text x="610" y="345" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">1. Object menyimpan data bernama dalam pasangan key-value.</text>
  <text x="610" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. Dot notation cocok untuk property name yang tetap.</text>
  <text x="610" y="435" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. Bracket notation cocok untuk key dinamis atau nama khusus.</text>
  <text x="610" y="480" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">4. Keduanya membaca nilai dari object yang sama.</text>
</svg>
