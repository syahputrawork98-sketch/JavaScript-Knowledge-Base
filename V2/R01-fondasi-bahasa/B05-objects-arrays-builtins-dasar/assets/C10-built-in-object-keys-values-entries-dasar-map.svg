<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">C10 Built-in Object keys, values, dan entries Dasar Map</text>

  <rect x="60" y="110" width="240" height="95" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="130" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">keys</text>
  <text x="99" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1e3a8a">nama property</text>

  <rect x="350" y="110" width="240" height="95" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="414" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#166534">values</text>
  <text x="402" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#166534">isi property</text>

  <rect x="640" y="110" width="240" height="95" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="702" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#92400e">entries</text>
  <text x="677" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#92400e">pasangan key-value</text>

  <rect x="930" y="110" width="210" height="95" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="989" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#991b1b">Output</text>
  <text x="960" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#991b1b">semuanya array</text>

  <line x1="300" y1="158" x2="350" y2="158" stroke="#334155" stroke-width="3"/>
  <polygon points="350,158 338,151 338,165" fill="#334155"/>
  <line x1="590" y1="158" x2="640" y2="158" stroke="#334155" stroke-width="3"/>
  <polygon points="640,158 628,151 628,165" fill="#334155"/>
  <line x1="880" y1="158" x2="930" y2="158" stroke="#334155" stroke-width="3"/>
  <polygon points="930,158 918,151 918,165" fill="#334155"/>

  <rect x="60" y="260" width="500" height="290" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Object Sumber</text>
  <text x="90" y="355" font-family="Consolas, monospace" font-size="20" fill="#1e293b">const user = { name: 'Alya', age: 21 };</text>
  <text x="90" y="410" font-family="Consolas, monospace" font-size="20" fill="#1e293b">Object.keys(user)   // ['name', 'age']</text>
  <text x="90" y="450" font-family="Consolas, monospace" font-size="20" fill="#1e293b">Object.values(user) // ['Alya', 21]</text>
  <text x="90" y="490" font-family="Consolas, monospace" font-size="20" fill="#1e293b">Object.entries(user)// [['name','Alya'], ['age',21]]</text>

  <rect x="610" y="260" width="530" height="290" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="640" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Poin Inti</text>
  <text x="640" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">1. keys fokus pada nama property.</text>
  <text x="640" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. values fokus pada isi property.</text>
  <text x="640" y="445" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. entries cocok saat nama dan isi perlu dibaca bersama.</text>
  <text x="640" y="490" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">4. Ketiganya menghasilkan array, bukan object baru.</text>
</svg>
