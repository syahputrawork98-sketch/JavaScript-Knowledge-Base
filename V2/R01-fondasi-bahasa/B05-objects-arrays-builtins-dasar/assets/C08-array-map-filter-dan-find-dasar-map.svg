<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">C08 Array map, filter, dan find Dasar Map</text>

  <rect x="60" y="110" width="220" height="95" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="138" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e3a8a">map</text>
  <text x="106" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1e3a8a">ubah setiap elemen</text>

  <rect x="340" y="110" width="220" height="95" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="405" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#166534">filter</text>
  <text x="382" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#166534">saring elemen</text>

  <rect x="620" y="110" width="220" height="95" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="696" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#92400e">find</text>
  <text x="654" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#92400e">ambil satu hasil</text>

  <rect x="900" y="110" width="240" height="95" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="973" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#991b1b">Output</text>
  <text x="932" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#991b1b">array baru / satu nilai</text>

  <line x1="280" y1="158" x2="340" y2="158" stroke="#334155" stroke-width="3"/>
  <polygon points="340,158 328,151 328,165" fill="#334155"/>
  <line x1="560" y1="158" x2="620" y2="158" stroke="#334155" stroke-width="3"/>
  <polygon points="620,158 608,151 608,165" fill="#334155"/>
  <line x1="840" y1="158" x2="900" y2="158" stroke="#334155" stroke-width="3"/>
  <polygon points="900,158 888,151 888,165" fill="#334155"/>

  <rect x="60" y="260" width="500" height="290" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="90" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Pertanyaan yang Dijawab</text>
  <text x="90" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">map: "setiap item mau saya ubah jadi apa?"</text>
  <text x="90" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">filter: "item mana saja yang lolos?"</text>
  <text x="90" y="445" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">find: "item pertama yang cocok yang mana?"</text>
  <text x="90" y="500" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Semua lebih ekspresif daripada loop manual untuk tujuan ini.</text>

  <rect x="610" y="260" width="530" height="290" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="640" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0f172a">Poin Inti</text>
  <text x="640" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">1. map menghasilkan array baru dengan jumlah elemen sama.</text>
  <text x="640" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">2. filter menghasilkan array baru yang bisa lebih pendek.</text>
  <text x="640" y="445" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">3. find mengembalikan satu elemen atau undefined.</text>
  <text x="640" y="490" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#334155">4. Ketiganya membantu menyatakan niat operasi data.</text>
</svg>
