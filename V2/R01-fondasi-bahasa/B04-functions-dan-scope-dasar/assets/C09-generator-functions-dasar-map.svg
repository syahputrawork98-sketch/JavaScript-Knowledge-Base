  <rect width="640" height="360" fill="#ecfeff"/>
  <rect x="24" y="24" width="592" height="312" rx="20" fill="#fcffff" stroke="#1f2937" stroke-width="2"/>
  <text x="48" y="62" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">C09 Generator Functions Dasar</text>
  <text x="48" y="92" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">function* -> yield values -> iterator driven progress</text>
  <rect x="48" y="124" width="168" height="156" rx="16" fill="#a5f3fc"/>
  <rect x="236" y="124" width="168" height="156" rx="16" fill="#ddd6fe"/>
  <rect x="424" y="124" width="168" height="156" rx="16" fill="#fde68a"/>
  <text x="64" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Create</text>
  <text x="64" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- function star syntax</text>
  <text x="64" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- returns iterator</text>
  <text x="64" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- body paused at start</text>
  <text x="252" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Yield</text>
  <text x="252" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- send value out</text>
