<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="640" height="360" fill="#f0fdf4"/>
  <rect x="24" y="24" width="592" height="312" rx="20" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="48" y="62" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">C18 Async Function Body dan Evaluation</text>
  <text x="48" y="92" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">await pause -> return resolve -> throw reject</text>
  <rect x="48" y="124" width="168" height="156" rx="16" fill="#86efac"/>
  <rect x="236" y="124" width="168" height="156" rx="16" fill="#bfdbfe"/>
  <rect x="424" y="124" width="168" height="156" rx="16" fill="#fecaca"/>
  <text x="64" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Await</text>
  <text x="64" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- pause function flow</text>
  <text x="64" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- resume on settle</text>
  <text x="64" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- not whole program stop</text>
  <text x="252" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Return</text>
  <text x="252" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- resolves Promise</text>
  <text x="252" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- passes final value</text>
  <text x="252" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- completes body</text>
  <text x="440" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Throw</text>
  <text x="440" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- rejects Promise</text>
  <text x="440" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- catch at caller</text>
  <text x="440" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- async error path</text>
</svg>
