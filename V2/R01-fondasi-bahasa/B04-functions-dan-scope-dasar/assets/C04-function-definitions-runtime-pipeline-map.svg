<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <rect width="640" height="360" fill="#f0fdf4"/>
  <rect x="24" y="24" width="592" height="312" rx="20" fill="#fcfffd" stroke="#1f2937" stroke-width="2"/>
  <text x="48" y="62" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">C04 Function Definitions Runtime Pipeline</text>
  <text x="48" y="92" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">Creation time -> binding time -> execution time</text>
  <rect x="48" y="124" width="168" height="156" rx="16" fill="#86efac"/>
  <rect x="236" y="124" width="168" height="156" rx="16" fill="#fde68a"/>
  <rect x="424" y="124" width="168" height="156" rx="16" fill="#bfdbfe"/>
  <text x="64" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Instantiate</text>
  <text x="64" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- create function object</text>
  <text x="64" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- bind declaration</text>
  <text x="64" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- expression waits</text>
  <text x="252" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Evaluate</text>
  <text x="252" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- call enters body</text>
  <text x="252" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- params get values</text>
  <text x="252" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- runtime begins</text>
  <text x="440" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Observe</text>
  <text x="440" y="182" font-family="Arial, sans-serif" font-size="14" fill="#111827">- declaration hoists</text>
  <text x="440" y="204" font-family="Arial, sans-serif" font-size="14" fill="#111827">- expression is timed</text>
  <text x="440" y="226" font-family="Arial, sans-serif" font-size="14" fill="#111827">- call triggers work</text>
</svg>
