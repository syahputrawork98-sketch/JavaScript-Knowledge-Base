<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Concurrency Patterns Visual</title>
  <desc id="desc">Emoji matrix for Promise.all allSettled race and any.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8fffb"/><stop offset="100%" stop-color="#edf4ff"/></linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <style>.head{fill:url(#head);rx:16;filter:url(#shadow)} .all{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:14;filter:url(#shadow)} .settled{fill:#ffedd5;stroke:#c2410c;stroke-width:2;rx:14;filter:url(#shadow)} .race{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2;rx:14;filter:url(#shadow)} .any{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:14;filter:url(#shadow)} .box{fill:#fff;stroke:#334155;stroke-width:2;rx:14;filter:url(#shadow)} .title{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#fff} .sub{font:500 17px 'Segoe UI',sans-serif;fill:#d1fae5} .h{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a} .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155} .s{font:600 13px 'Segoe UI',sans-serif;fill:#1f2937}</style>
  </defs>
  <rect width="1280" height="860" fill="url(#bg)"/>
  <rect class="head" x="46" y="30" width="1188" height="118"/>
  <text class="title" x="80" y="78">🧮 Concurrency Patterns</text>
  <text class="sub" x="80" y="106">Pilih combinator Promise sesuai kebutuhan hasil.</text>

  <rect class="all" x="80" y="190" width="540" height="220"/>
  <text class="h" x="108" y="230">🟥 Promise.all</text>
  <text class="p" x="108" y="256">Semua harus sukses (fail-fast).</text>

  <rect class="settled" x="660" y="190" width="540" height="220"/>
  <text class="h" x="688" y="230">🟧 Promise.allSettled</text>
  <text class="p" x="688" y="256">Kumpulkan status semua task.</text>

  <rect class="race" x="80" y="440" width="540" height="220"/>
  <text class="h" x="108" y="480">🟦 Promise.race</text>
  <text class="p" x="108" y="506">Ambil yang settle paling cepat.</text>

  <rect class="any" x="660" y="440" width="540" height="220"/>
  <text class="h" x="688" y="480">🟩 Promise.any</text>
  <text class="p" x="688" y="506">Ambil resolve pertama.</text>

  <rect class="box" x="80" y="700" width="1120" height="120"/>
  <text class="s" x="106" y="740">Rule cepat: wajib semua sukses -> all | boleh parsial -> allSettled | tercepat settle -> race | tercepat sukses -> any</text>
</svg>
