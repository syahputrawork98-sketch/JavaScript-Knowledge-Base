<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Async Error Handling Visual</title>
  <desc id="desc">Layered emoji guide for local catch, fallback, rethrow and global safety net.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff8f8"/><stop offset="100%" stop-color="#eef6ff"/></linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7f1d1d"/><stop offset="100%" stop-color="#1e3a8a"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <style>.head{fill:url(#head);rx:16;filter:url(#shadow)} .danger{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:14;filter:url(#shadow)} .safe{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:14;filter:url(#shadow)} .warn{fill:#ffedd5;stroke:#c2410c;stroke-width:2;rx:14;filter:url(#shadow)} .box{fill:#fff;stroke:#334155;stroke-width:2;rx:14;filter:url(#shadow)} .title{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#fff} .sub{font:500 17px 'Segoe UI',sans-serif;fill:#dbeafe} .h{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a} .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155} .s{font:600 13px 'Segoe UI',sans-serif;fill:#1f2937}</style>
  </defs>
  <rect width="1280" height="860" fill="url(#bg)"/>
  <rect class="head" x="46" y="30" width="1188" height="118"/>
  <text class="title" x="80" y="78">🧯 Async Error Handling</text>
  <text class="sub" x="80" y="106">Tangkap error dengan jelas: fallback, rethrow, dan safety net.</text>

  <rect class="danger" x="80" y="190" width="1120" height="110"/>
  <text class="h" x="108" y="230">1️⃣ Local Catch</text>
  <text class="p" x="108" y="256">Tangkap error dekat sumber, tambah context log.</text>

  <rect class="warn" x="80" y="330" width="540" height="220"/>
  <text class="h" x="108" y="372">2️⃣ Rethrow</text>
  <text class="p" x="108" y="398">Jika tidak bisa recovery di level ini, lempar ke caller.</text>

  <rect class="safe" x="660" y="330" width="540" height="220"/>
  <text class="h" x="688" y="372">3️⃣ Fallback</text>
  <text class="p" x="688" y="398">Jika bisa recovery, kembalikan nilai cadangan eksplisit.</text>

  <rect class="box" x="80" y="590" width="1120" height="220"/>
  <text class="h" x="108" y="630">🛡️ Global Safety Net</text>
  <text class="s" x="128" y="658">1. Pasang handler unhandled rejection untuk observability terakhir.</text>
  <text class="s" x="128" y="684">2. Aturan emas: jangan biarkan rejection tanpa owner.</text>
</svg>
