<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Event Loop Flow Visual</title>
  <desc id="desc">Emoji-based event loop flow from sync to microtask to task.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fffef4"/><stop offset="100%" stop-color="#edf6ff"/></linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/></filter>
    <style>.head{fill:url(#head);rx:16;filter:url(#shadow)} .card{fill:#fff;stroke:#334155;stroke-width:2;rx:14;filter:url(#shadow)} .sync{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2;rx:14;filter:url(#shadow)} .micro{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:14;filter:url(#shadow)} .task{fill:#fde68a;stroke:#b45309;stroke-width:2;rx:14;filter:url(#shadow)} .title{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#fff} .sub{font:500 17px 'Segoe UI',sans-serif;fill:#d1fae5} .h{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a} .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155} .s{font:600 13px 'Segoe UI',sans-serif;fill:#1f2937}</style>
  </defs>
  <rect width="1280" height="860" fill="url(#bg)"/>
  <rect class="head" x="46" y="30" width="1188" height="118"/>
  <text class="title" x="80" y="78">🔄 Event Loop Flow</text>
  <text class="sub" x="80" y="106">Urutan inti: sync selesai -> microtask drain -> task queue.</text>

  <rect class="sync" x="80" y="190" width="360" height="210"/>
  <text class="h" x="106" y="232">🧱 Sync Stack</text>
  <text class="p" x="106" y="260">Kode sinkron jalan dulu sampai selesai.</text>

  <rect class="micro" x="460" y="190" width="360" height="210"/>
  <text class="h" x="486" y="232">⚡ Microtask Queue</text>
  <text class="p" x="486" y="260">Promise callbacks diproses lebih dulu.</text>

  <rect class="task" x="840" y="190" width="360" height="210"/>
  <text class="h" x="866" y="232">📬 Task Queue</text>
  <text class="p" x="866" y="260">Timer/event callback menyusul setelah microtask.</text>

  <rect class="card" x="80" y="440" width="1120" height="350"/>
  <text class="h" x="106" y="480">✅ Debug Rule</text>
  <text class="s" x="126" y="510">1. setTimeout(0) bukan langsung jalan, hanya masuk antrean task.</text>
  <text class="s" x="126" y="536">2. Promise.then selalu dicek di microtask sebelum task queue.</text>
  <text class="s" x="126" y="562">3. Jika chain microtask terlalu panjang, UI bisa terasa lag (starvation).</text>
</svg>
