<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc"><title id="title">Copy Strategies Visual</title><desc id="desc">Shallow vs deep copy strategy map with practical decision checklist.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fffef2"/><stop offset="100%" stop-color="#edf6ff"/></linearGradient><linearGradient id="head" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="170%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/></filter><style>.h{fill:url(#head);rx:16;filter:url(#shadow)} .sh{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:14;filter:url(#shadow)} .dp{fill:#dcfce7;stroke:#166534;stroke-width:2;rx:14;filter:url(#shadow)} .b{fill:#fff;stroke:#334155;stroke-width:2;rx:14;filter:url(#shadow)} .t{font:700 32px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#fff} .s{font:500 17px 'Segoe UI',sans-serif;fill:#dbeafe} .hh{font:700 20px 'Segoe UI Emoji','Segoe UI',sans-serif;fill:#0f172a} .p{font:500 15px 'Segoe UI',sans-serif;fill:#334155} .x{font:600 13px 'Segoe UI',sans-serif;fill:#1f2937}</style></defs><rect width="1280" height="860" fill="url(#bg)"/><rect class="h" x="46" y="30" width="1188" height="118"/><text class="t" x="80" y="78">📦 Copy Strategies: Shallow vs Deep</text><text class="s" x="80" y="106">Pilih strategi copy sesuai kebutuhan nested update.</text><rect class="sh" x="80" y="190" width="540" height="240"/><text class="hh" x="108" y="232">⚠️ Shallow Copy</text><text class="p" x="108" y="260">Salin level pertama saja (spread/Object.assign).</text><text class="p" x="108" y="286">Nested object masih share reference.</text><rect class="dp" x="660" y="190" width="540" height="240"/><text class="hh" x="688" y="232">✅ Deep Copy</text><text class="p" x="688" y="260">Salin sampai nested level (mis. structuredClone).</text><text class="p" x="688" y="286">Perubahan nested tidak menyentuh data asal.</text><rect class="b" x="80" y="470" width="1120" height="320"/><text class="hh" x="108" y="510">🧭 Rule Pilihan</text><text class="x" x="128" y="540">1. Hanya ubah level pertama -> shallow cukup.</text><text class="x" x="128" y="566">2. Ubah nested data -> butuh deep copy terkontrol.</text><text class="x" x="128" y="592">3. Hindari deep copy berlebihan di jalur performa kritikal.</text></svg>
